<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Story Charts</title>
  <link rel="stylesheet" href="/app.css">
  <link rel="icon" href="/favicon/favicon.ico">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
</head>
<body>
  <div class="header" id="header"></div>
  <div id="content"><p class="empty">Loading...</p></div>

  <script src="/app.js"></script>
  <script>
    const COLORS = ['#c0563a','#5a8a6a','#b08830','#7a5a8a','#3a7a9a'];

    (async function() {
      var user = await getUser();
      renderHeader(user);

      var id = new URLSearchParams(location.search).get('id');
      if (!id) { location.href = '/'; return; }

      var data;
      try { data = await api('GET', 'stories/' + id); }
      catch (e) { document.getElementById('content').innerHTML = '<p class="empty">' + e.message + '</p>'; return; }

      var story = data.story;
      var plots = data.plots;
      var cp = data.chartPoints || [];

      document.getElementById('content').innerHTML =
        '<h1>' + (story.title || 'Untitled') + '</h1>' +
        '<p style="text-align:center;color:#888;font-size:0.85em;margin:4px 0">Style 4: Warm Paper</p>' +
        '<div style="position:relative;width:100%;height:0;padding-bottom:100%;border:2px solid #c8b89a;border-radius:2px;overflow:hidden;background:#faf6ee">' +
          '<canvas id="myChart" style="position:absolute;top:0;left:0;width:100%;height:100%"></canvas>' +
        '</div>' +
        '<p id="debug" style="font-size:0.8em;color:#999;margin-top:8px"></p>';

      document.getElementById('debug').textContent =
        'plots: ' + plots.length + ', points: ' + cp.length;

      // Build datasets — x_pos and y_val are 0-10000, plot as percentage (0-100)
      var byPlot = {};
      for (var i = 0; i < cp.length; i++) {
        var p = cp[i];
        if (!byPlot[p.plot_id]) byPlot[p.plot_id] = [];
        byPlot[p.plot_id].push({ x: p.x_pos / 100, y: p.y_val / 100 });
      }

      var datasets = [];
      for (var pi = 0; pi < plots.length; pi++) {
        var pts = byPlot[plots[pi].id] || [];
        pts.sort(function(a, b) { return a.x - b.x; });
        datasets.push({
          label: plots[pi].title || 'Plot',
          data: pts,
          borderColor: COLORS[pi % COLORS.length],
          backgroundColor: COLORS[pi % COLORS.length],
          showLine: true,
          tension: 0,
          pointRadius: 7,
          pointStyle: 'triangle',
          borderWidth: 2.5,
          fill: false
        });
      }

      var ctx = document.getElementById('myChart').getContext('2d');
      new Chart(ctx, {
        type: 'scatter',
        data: { datasets: datasets },
        options: {
          responsive: true,
          maintainAspectRatio: true,
          aspectRatio: 1,
          layout: { padding: 16 },
          clip: false,
          plugins: {
            legend: { display: false },
            tooltip: {
              callbacks: {
                label: function(item) {
                  return item.dataset.label + ': (' + item.raw.x.toFixed(2) + '%, ' + item.raw.y.toFixed(2) + '%)';
                }
              }
            }
          },
          scales: {
            x: {
              type: 'linear',
              min: 0,
              max: 100,
              ticks: { display: false, stepSize: 5 },
              grid: { color: 'rgba(160,140,100,0.15)', lineWidth: 0.5, drawTicks: false },
              border: { display: false }
            },
            y: {
              type: 'linear',
              min: 0,
              max: 100,
              ticks: { display: false, stepSize: 5 },
              grid: {
                color: function(ctx) { return ctx.tick.value === 50 ? 'rgba(160,140,100,0.4)' : 'rgba(160,140,100,0.15)'; },
                lineWidth: function(ctx) { return ctx.tick.value === 50 ? 1.5 : 0.5; },
                drawTicks: false
              },
              border: { display: false }
            }
          }
        }
      });
    })();
  </script>
</body>
</html>
