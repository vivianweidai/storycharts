<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Story Charts</title>
  <link rel="stylesheet" href="/app.css">
  <link rel="icon" href="/favicon/favicon.ico">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-dragdata@latest/dist/chartjs-plugin-dragdata.min.js"></script>
</head>
<body>
  <div class="header" id="header"></div>
  <div id="content"><p class="empty">Loading...</p></div>

  <script src="/app.js"></script>
  <script>
    let storyData = null;
    let chartInstance = null;

    (async function() {
      const user = await getUser();
      renderHeader(user);

      const id = new URLSearchParams(location.search).get('id');
      if (!id) { location.href = '/'; return; }

      try {
        storyData = await api('GET', 'stories/' + id);
      } catch (e) {
        document.getElementById('content').innerHTML = '<p class="empty">' + e.message + '</p>';
        return;
      }

      render(storyData, user);
    })();

    function render(data, user) {
      const { story, plots, scenes, turningPoints, isOwner } = data;
      const content = document.getElementById('content');
      let html = '';

      // Title row with edit (includes delete)
      html += '<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">';
      html += '<h1 style="margin:0">' + (story.title || 'Untitled') + '</h1>';
      if (story.private) html += '<span class="badge badge-private">private</span>';
      if (isOwner) {
        html += '<button class="btn-icon" onclick="editStory()" title="Edit story">&#9998;</button>';
      }
      html += '</div>';

      // Chart area — always present
      html += '<div class="chart-container" id="chart-area" style="height:400px;margin:16px 0">';
      if (!plots.length && !scenes.length) {
        html += '<p class="empty">Add plots and scenes to build your chart.</p>';
      }
      html += '</div>';


      // Summary section
      html += '<hr class="section-divider">';
      html += '<div style="display:flex;align-items:center;gap:8px">';
      html += '<h2 style="margin:0">Summary</h2>';
      if (isOwner) html += '<button class="btn-icon" onclick="editSummary()" title="Edit summary">&#9998;</button>';
      html += '</div>';
      html += '<p style="font-size:0.9em;color:#444;margin:4px 0 8px">' + (story.summary || '<em>No summary yet</em>') + '</p>';

      // Plots section with drag handles
      html += '<hr class="section-divider">';
      html += '<div style="display:flex;align-items:center;gap:8px">';
      html += '<h2 style="margin:0">Plots</h2>';
      if (isOwner) html += '<button class="btn btn-sm btn-primary" onclick="addPlot()">+ Add</button>';
      html += '</div>';
      if (plots.length) {
        html += '<div class="drag-list" id="plot-list">';
        for (const p of plots) {
          html += '<div class="drag-item" data-id="' + p.id + '" draggable="true">';
          if (isOwner) html += '<span class="drag-handle" title="Drag to reorder">&#8942;&#8942;</span>';
          html += '<details open style="flex:1"><summary>' + (p.title || 'Untitled Plot');
          if (isOwner) html += ' <button class="btn-icon" onclick="event.stopPropagation();editPlot(' + p.id + ')" title="Edit plot">&#9998;</button>';
          html += '</summary><div class="detail-body">' + (p.description || '<em>No description</em>') + '</div></details>';
          html += '</div>';
        }
        html += '</div>';
      } else {
        html += '<p class="empty" style="padding:12px 0">No plots yet.</p>';
      }

      // Scenes section with drag handles
      html += '<hr class="section-divider">';
      html += '<div style="display:flex;align-items:center;gap:8px">';
      html += '<h2 style="margin:0">Scenes</h2>';
      if (isOwner) html += '<button class="btn btn-sm btn-primary" onclick="addScene()">+ Add</button>';
      html += '</div>';
      if (scenes.length) {
        html += '<div class="drag-list" id="scene-list">';
        for (const s of scenes) {
          html += '<div class="drag-item" data-id="' + s.id + '" draggable="true">';
          if (isOwner) html += '<span class="drag-handle" title="Drag to reorder">&#8942;&#8942;</span>';
          html += '<details open style="flex:1"><summary>' + (s.title || 'Untitled Scene');
          if (isOwner) html += ' <button class="btn-icon" onclick="event.stopPropagation();editScene(' + s.id + ')" title="Edit scene">&#9998;</button>';
          html += '</summary><div class="detail-body">' + (s.description || '<em>No description</em>') + '</div></details>';
          html += '</div>';
        }
        html += '</div>';
      } else {
        html += '<p class="empty" style="padding:12px 0">No scenes yet.</p>';
      }

      content.innerHTML = html;

      // Render the draggable chart if we have plots and scenes
      if (plots.length && scenes.length) {
        chartInstance = renderDraggableChart(
          document.getElementById('chart-area'),
          plots, scenes, turningPoints,
          () => autoSaveChart()
        );
      }

      // Init drag-and-drop reordering for plots and scenes
      if (isOwner) initDragReorder();
    }

    // --- Chart auto-save ---

    async function autoSaveChart() {
      if (!chartInstance || !chartInstance._tpMap) return;
      const tpMap = chartInstance._tpMap;
      const tps = [];
      for (const plot of storyData.plots) {
        for (const scene of storyData.scenes) {
          const key = plot.id + '-' + scene.id;
          tps.push({
            plot_id: plot.id,
            scene_id: scene.id,
            tp_type: String(tpMap[key] || 10)
          });
        }
      }
      await api('POST', 'stories/' + storyData.story.id + '/turningpoints', { turningPoints: tps });
    }

    // --- Story CRUD ---

    function editStory() {
      const s = storyData.story;
      showModal('Edit Story', [
        { name: 'title', label: 'Title', type: 'text', value: s.title },
        { name: 'private', label: 'Visibility', type: 'checkbox', checkLabel: 'Private', value: s.private }
      ], async (data) => {
        await api('PUT', 'stories/' + s.id, { ...data, summary: s.summary });
        location.reload();
      }, async () => {
        await api('DELETE', 'stories/' + s.id);
        location.href = '/';
      });
    }

    function editSummary() {
      const s = storyData.story;
      showModal('Edit Summary', [
        { name: 'summary', label: 'Summary', type: 'textarea', value: s.summary }
      ], async (data) => {
        await api('PUT', 'stories/' + s.id, { title: s.title, private: s.private, summary: data.summary });
        location.reload();
      });
    }

    // --- Plot CRUD ---

    function addPlot() {
      showModal('New Plot', [
        { name: 'title', label: 'Title', type: 'text' },
        { name: 'description', label: 'Description', type: 'textarea' }
      ], async (data) => {
        await api('POST', 'stories/' + storyData.story.id + '/plots', data);
        location.reload();
      });
    }

    function editPlot(plotId) {
      const p = storyData.plots.find(x => x.id === plotId);
      showModal('Edit Plot', [
        { name: 'title', label: 'Title', type: 'text', value: p.title },
        { name: 'description', label: 'Description', type: 'textarea', value: p.description }
      ], async (data) => {
        await api('PUT', 'plots/' + plotId, data);
        location.reload();
      }, async () => {
        await api('DELETE', 'plots/' + plotId);
        location.reload();
      });
    }

    // --- Scene CRUD ---

    function addScene() {
      showModal('New Scene', [
        { name: 'title', label: 'Title', type: 'text' },
        { name: 'description', label: 'Description', type: 'textarea' }
      ], async (data) => {
        await api('POST', 'stories/' + storyData.story.id + '/scenes', data);
        location.reload();
      });
    }

    function editScene(sceneId) {
      const s = storyData.scenes.find(x => x.id === sceneId);
      showModal('Edit Scene', [
        { name: 'title', label: 'Title', type: 'text', value: s.title },
        { name: 'description', label: 'Description', type: 'textarea', value: s.description }
      ], async (data) => {
        await api('PUT', 'scenes/' + sceneId, data);
        location.reload();
      }, async () => {
        await api('DELETE', 'scenes/' + sceneId);
        location.reload();
      });
    }

    // --- Drag-and-drop reorder ---

    function initDragReorder() {
      for (const list of document.querySelectorAll('.drag-list')) {
        let dragItem = null;
        let handleGrabbed = false;

        list.addEventListener('mousedown', (e) => {
          handleGrabbed = !!e.target.closest('.drag-handle');
        });

        list.addEventListener('dragstart', (e) => {
          if (!handleGrabbed) { e.preventDefault(); return; }
          dragItem = e.target.closest('.drag-item');
          if (!dragItem) return;
          dragItem.classList.add('dragging');
          e.dataTransfer.effectAllowed = 'move';
        });

        list.addEventListener('dragover', (e) => {
          e.preventDefault();
          if (!dragItem) return;
          const target = e.target.closest('.drag-item');
          if (!target || target === dragItem) return;
          const rect = target.getBoundingClientRect();
          const mid = rect.top + rect.height / 2;
          if (e.clientY < mid) {
            list.insertBefore(dragItem, target);
          } else {
            list.insertBefore(dragItem, target.nextSibling);
          }
        });

        list.addEventListener('dragend', async () => {
          if (!dragItem) return;
          dragItem.classList.remove('dragging');
          dragItem = null;
          handleGrabbed = false;
          await saveOrder();
        });
      }
    }

    async function saveOrder() {
      const plotList = document.getElementById('plot-list');
      const sceneList = document.getElementById('scene-list');
      const plotIds = plotList ? [...plotList.querySelectorAll('.drag-item')].map(el => parseInt(el.dataset.id)) : [];
      const sceneIds = sceneList ? [...sceneList.querySelectorAll('.drag-item')].map(el => parseInt(el.dataset.id)) : [];
      await api('POST', 'stories/' + storyData.story.id + '/order', { plots: plotIds, scenes: sceneIds });
      // Reload to update chart with new order
      location.reload();
    }
  </script>
</body>
</html>
