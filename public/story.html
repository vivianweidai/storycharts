<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Story Charts</title>
  <link rel="stylesheet" href="/app.css">
  <link rel="icon" href="/favicon/favicon.ico">
  <style>
    @media (min-width: 600px) {
      .chart-wrap { aspect-ratio: 1.618 / 1 !important; }
    }
  </style>
</head>
<body>
  <div class="header" id="header"></div>
  <div id="content"><p class="empty">Loading...</p></div>

  <script src="/app.js"></script>
  <script>
  var COLORS = ['#4a7fd4','#e06040','#50a040','#d4a020','#9060c0'];
  var MAX_TITLE = 60;
  function esc(s) { var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
  var storyId, plots, points; // points: [{plot_id, x, y, label}]
  var canvas, ctx, W, H, PAD = 20;
  var selDi = -1, selPi = -1; // -1=none, selPi=-1 means plot selected
  var dragPt = null, isDragging = false, didMove = false;

  function toX(v) { return PAD + (v / 10000) * (W - 2 * PAD); }
  function toY(v) { return PAD + (1 - v / 10000) * (H - 2 * PAD); }
  function fromX(px) { return Math.max(0, Math.min(10000, Math.round(((px - PAD) / (W - 2 * PAD)) * 10000))); }
  function fromY(py) { return Math.max(0, Math.min(10000, Math.round((1 - (py - PAD) / (H - 2 * PAD)) * 10000))); }

  function grouped() {
    var g = [];
    for (var i = 0; i < plots.length; i++) g.push([]);
    for (var i = 0; i < points.length; i++) {
      for (var d = 0; d < plots.length; d++) {
        if (plots[d].id === points[i].plot_id) { g[d].push(points[i]); break; }
      }
    }
    for (var d = 0; d < g.length; d++) g[d].sort(function(a,b){ return a.x - b.x; });
    return g;
  }

  function draw() {
    var dpr = window.devicePixelRatio || 1;
    var rect = canvas.getBoundingClientRect();
    canvas.width = rect.width * dpr; canvas.height = rect.height * dpr;
    ctx.scale(dpr, dpr);
    W = rect.width; H = rect.height;

    // Grid
    var gridAlpha = isOwnerGlobal ? 0.15 : 0.10;
    var midAlpha = isOwnerGlobal ? 0.35 : 0.22;
    ctx.strokeStyle = 'rgba(70,120,180,' + gridAlpha + ')'; ctx.lineWidth = 0.5;
    for (var i = 0; i <= 20; i++) {
      var x = PAD + (i / 20) * (W - 2 * PAD);
      ctx.beginPath(); ctx.moveTo(x, PAD); ctx.lineTo(x, H - PAD); ctx.stroke();
    }
    for (var i = 0; i <= 20; i++) {
      var y = PAD + (i / 20) * (H - 2 * PAD);
      if (i === 10) { ctx.strokeStyle = 'rgba(70,120,180,' + midAlpha + ')'; ctx.lineWidth = 1; }
      ctx.beginPath(); ctx.moveTo(PAD, y); ctx.lineTo(W - PAD, y); ctx.stroke();
      if (i === 10) { ctx.strokeStyle = 'rgba(70,120,180,' + gridAlpha + ')'; ctx.lineWidth = 0.5; }
    }

    var g = grouped();
    var lineOpacity = isOwnerGlobal ? 1 : 0.55;

    // Halo on selected/dragged point (drawn first, behind everything)
    var hp = null;
    if (dragPt && selDi >= 0) {
      hp = dragPt; // always track the actual dragged object
    } else if (selDi >= 0 && selPi >= 0 && g[selDi] && g[selDi][selPi]) {
      hp = g[selDi][selPi];
    }
    if (hp) {
      var color = COLORS[selDi % COLORS.length];
      ctx.fillStyle = color + '15';
      ctx.beginPath(); ctx.arc(toX(hp.x), toY(hp.y), 22, 0, Math.PI * 2); ctx.fill();
      ctx.strokeStyle = color + '40'; ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.arc(toX(hp.x), toY(hp.y), 22, 0, Math.PI * 2); ctx.stroke();
    }

    // Lines
    for (var d = 0; d < g.length; d++) {
      var pts = g[d]; if (pts.length < 2) continue;
      var baseColor = COLORS[d % COLORS.length];
      ctx.strokeStyle = isOwnerGlobal ? baseColor : hexWithAlpha(baseColor, lineOpacity);
      ctx.lineWidth = (selDi === d && selPi < 0) ? 4 : 2;
      ctx.beginPath();
      ctx.moveTo(toX(pts[0].x), toY(pts[0].y));
      for (var i = 1; i < pts.length; i++) ctx.lineTo(toX(pts[i].x), toY(pts[i].y));
      ctx.stroke();
    }

    // Points
    var ptRadius = isOwnerGlobal ? 5 : 4;
    for (var d = 0; d < g.length; d++) {
      for (var i = 0; i < g[d].length; i++) {
        var baseColor = COLORS[d % COLORS.length];
        ctx.fillStyle = isOwnerGlobal ? baseColor : hexWithAlpha(baseColor, lineOpacity);
        ctx.beginPath();
        ctx.arc(toX(g[d][i].x), toY(g[d][i].y), ptRadius, 0, Math.PI * 2);
        ctx.fill();
      }
    }
  }

  function hexWithAlpha(hex, a) {
    var r = parseInt(hex.slice(1,3), 16);
    var g = parseInt(hex.slice(3,5), 16);
    var b = parseInt(hex.slice(5,7), 16);
    return 'rgba(' + r + ',' + g + ',' + b + ',' + a + ')';
  }

  // Hit test: point first, then line
  function hitPoint(cx, cy) {
    var g = grouped();
    var best = null, bestD = 22;
    for (var d = 0; d < g.length; d++) {
      for (var i = 0; i < g[d].length; i++) {
        var dx = toX(g[d][i].x) - cx, dy = toY(g[d][i].y) - cy;
        var dist = Math.sqrt(dx*dx + dy*dy);
        if (dist < bestD) { bestD = dist; best = { di: d, pi: i, pt: g[d][i] }; }
      }
    }
    return best;
  }

  function hitLine(cx, cy) {
    var g = grouped();
    for (var d = 0; d < g.length; d++) {
      var pts = g[d];
      for (var i = 0; i < pts.length - 1; i++) {
        var ax = toX(pts[i].x), ay = toY(pts[i].y);
        var bx = toX(pts[i+1].x), by = toY(pts[i+1].y);
        var dx = bx-ax, dy = by-ay;
        var len2 = dx*dx + dy*dy;
        if (len2 === 0) continue;
        var t = Math.max(0, Math.min(1, ((cx-ax)*dx + (cy-ay)*dy) / len2));
        var px = ax + t*dx, py = ay + t*dy;
        var dist = Math.sqrt((cx-px)*(cx-px) + (cy-py)*(cy-py));
        if (dist < 12) return { di: d };
      }
    }
    return null;
  }

  function getPos(e) {
    var t = e.touches ? e.touches[0] : e;
    var r = canvas.getBoundingClientRect();
    return { x: t.clientX - r.left, y: t.clientY - r.top };
  }

  function onStart(e) {
    if (isDragging) return;
    if (!isOwnerGlobal) return;
    var pos = getPos(e);
    var hit = hitPoint(pos.x, pos.y);
    if (!hit) return;
    e.preventDefault();
    isDragging = true; didMove = false;
    infoEditing = false;
    dragPt = hit.pt;
    selDi = hit.di; selPi = hit.pi;
    draw(); updateInfo();
  }

  function onMove(e) {
    if (!isDragging || !dragPt) return;
    e.preventDefault(); didMove = true;
    var pos = getPos(e);
    dragPt.x = fromX(pos.x); dragPt.y = fromY(pos.y);
    draw(); updateInfo();
  }

  function onEnd() {
    if (!isDragging) return;
    isDragging = false;
    if (didMove) {
      selDi = -1; selPi = -1;
      draw(); updateInfo();
      savePoints();
    }
    dragPt = null;
  }

  function onClick(e) {
    if (didMove) { didMove = false; return; }
    infoEditing = false;
    var pos = getPos(e);
    if (hitPoint(pos.x, pos.y)) return; // handled by onStart
    var lh = hitLine(pos.x, pos.y);
    if (lh) { selDi = lh.di; selPi = -1; draw(); updateInfo(); return; }
    selDi = -1; selPi = -1; draw(); updateInfo();
  }

  var isOwnerGlobal = false;
  var infoEditing = false;

  function updateInfo() {
    var el = document.getElementById('info');
    if (infoEditing) return; // don't clobber while editing

    // Nothing selected — show add plot button
    if (selDi < 0) {
      el.innerHTML = isOwnerGlobal ?
        '<button class="btn btn-sm btn-primary" id="add-plot-btn">+ add plot</button>' : '';
      wireAddPlot();
      return;
    }

    var color = COLORS[selDi % COLORS.length];
    var plot = plots[selDi];

    if (selPi >= 0) {
      // TP selected — show label, coords, edit
      var g = grouped();
      var pt = g[selDi][selPi];
      el.innerHTML =
        '<div style="display:flex;align-items:center;gap:8px;justify-content:center">' +
          '<span style="color:' + color + ';font-weight:600">' + esc(plot.title) + '</span>' +
          '<span style="font-size:0.9em">' + esc(pt.label || 'Turning point') + '</span>' +
          (isOwnerGlobal ? '<button class="btn btn-sm" id="info-edit-btn">edit</button>' : '') +
        '</div>' +
        '<div style="font-size:0.8em;color:#888">(' + pt.x + ', ' + pt.y + ')</div>';
      if (isOwnerGlobal) document.getElementById('info-edit-btn').onclick = function() { editTP(selDi, selPi); };
    } else {
      // Plot selected — show name, desc, edit, add tp
      el.innerHTML =
        '<div style="display:flex;align-items:center;gap:8px;justify-content:center">' +
          '<span style="color:' + color + ';font-weight:600">' + esc(plot.title) + '</span>' +
          (isOwnerGlobal ? '<button class="btn btn-sm" id="info-edit-btn">edit</button>' +
                           '<button class="btn btn-sm btn-primary" id="add-tp-btn">+ tp</button>' : '') +
        '</div>' +
        '<div style="font-size:0.85em;color:#666">' + esc(plot.description || '') + '</div>';
      if (isOwnerGlobal) {
        document.getElementById('info-edit-btn').onclick = function() { editPlot(selDi); };
        document.getElementById('add-tp-btn').onclick = function() { addTP(selDi); };
      }
    }
  }

  function wireAddPlot() {
    var b = document.getElementById('add-plot-btn');
    if (b) b.onclick = addPlot;
  }

  // --- Inline edit: Plot ---
  function editPlot(di) {
    infoEditing = true;
    var el = document.getElementById('info');
    var plot = plots[di];
    var color = COLORS[di % COLORS.length];
    el.innerHTML =
      '<div style="display:flex;gap:6px;align-items:center;margin-bottom:6px">' +
        '<input id="ie-name" type="text" maxlength="40" value="' + esc(plot.title) + '" placeholder="Plot name" style="min-width:0;flex:1;padding:4px 8px;border:1.5px solid ' + color + ';border-radius:6px;font-size:16px;font-family:inherit;font-weight:600;color:' + color + '">' +
        '<button class="btn btn-sm btn-primary" id="ie-ok" style="flex-shrink:0">ok</button>' +
        '<button class="btn btn-sm btn-danger" id="ie-del" style="flex-shrink:0">del</button>' +
      '</div>' +
      '<input id="ie-desc" type="text" maxlength="120" value="' + esc(plot.description || '') + '" placeholder="Description" style="width:100%;padding:4px 8px;border:1px solid #d1d9e0;border-radius:6px;font-size:16px;font-family:inherit;color:#666">';
    document.getElementById('ie-name').focus();
    document.getElementById('ie-ok').onclick = function() {
      var name = document.getElementById('ie-name').value.trim().replace(/<[^>]*>/g, '').slice(0, 40) || 'Plot';
      var desc = document.getElementById('ie-desc').value.trim().replace(/<[^>]*>/g, '').slice(0, 120);
      plot.title = name; plot.description = desc;
      api('PUT', 'plots/' + plot.id, { title: name, description: desc });
      infoEditing = false; draw(); updateInfo();
    };
    document.getElementById('ie-del').onclick = function() {
      if (!confirm('Delete plot "' + plot.title + '" and all its turning points?')) return;
      api('DELETE', 'plots/' + plot.id);
      points = points.filter(function(p) { return p.plot_id !== plot.id; });
      plots.splice(di, 1);
      selDi = -1; selPi = -1; infoEditing = false;
      draw(); updateInfo();
    };
  }

  // --- Inline edit: TP ---
  function editTP(di, pi) {
    infoEditing = true;
    var el = document.getElementById('info');
    var g = grouped();
    var pt = g[di][pi];
    var color = COLORS[di % COLORS.length];
    el.innerHTML =
      '<div style="display:flex;gap:6px;align-items:center">' +
        '<span style="color:' + color + ';font-weight:600;flex-shrink:0">' + esc(plots[di].title) + '</span>' +
        '<input id="ie-label" type="text" maxlength="60" value="' + esc(pt.label || '') + '" placeholder="TP label" style="min-width:0;flex:1;padding:4px 8px;border:1.5px solid ' + color + ';border-radius:6px;font-size:16px;font-family:inherit">' +
        '<button class="btn btn-sm btn-primary" id="ie-ok" style="flex-shrink:0">ok</button>' +
        '<button class="btn btn-sm btn-danger" id="ie-del" style="flex-shrink:0">del</button>' +
      '</div>' +
      '<div style="font-size:0.8em;color:#888;margin-top:4px">(' + pt.x + ', ' + pt.y + ')</div>';
    document.getElementById('ie-label').focus();
    document.getElementById('ie-ok').onclick = function() {
      pt.label = document.getElementById('ie-label').value.trim().replace(/<[^>]*>/g, '').slice(0, 60);
      infoEditing = false; updateInfo(); savePoints();
    };
    document.getElementById('ie-del').onclick = function() {
      if (!confirm('Delete this turning point?')) return;
      var idx = points.indexOf(pt);
      if (idx >= 0) points.splice(idx, 1);
      selDi = -1; selPi = -1; infoEditing = false;
      draw(); updateInfo(); savePoints();
    };
  }

  // --- Add plot ---
  function addPlot() {
    var names = ['Plot A','Plot B','Plot C','Plot D','Plot E'];
    var name = names[plots.length % names.length];
    api('POST', 'stories/' + storyId + '/plots', { title: name, description: '' }).then(function(r) {
      plots.push({ id: r.id, title: name, description: '' });
      // Add 3 random TPs
      for (var i = 0; i < 3; i++) {
        points.push({ plot_id: r.id, x: Math.floor(Math.random() * 10001), y: Math.floor(Math.random() * 10001), label: 'New point' });
      }
      savePoints(); draw(); updateInfo();
    });
  }

  // --- Add TP to selected plot ---
  function addTP(di) {
    var plot = plots[di];
    points.push({ plot_id: plot.id, x: 5000, y: 5000, label: 'New point' });
    savePoints(); draw(); updateInfo();
  }

  function savePoints() {
    var out = [];
    for (var i = 0; i < points.length; i++) {
      out.push({ plot_id: points[i].plot_id, x_pos: points[i].x, y_val: points[i].y, label: points[i].label || '' });
    }
    api('POST', 'stories/' + storyId + '/chartpoints', { points: out });
  }

  // --- Init ---
  (async function() {
    var user = await getUser();
    renderHeader(user);
    var id = new URLSearchParams(location.search).get('id');
    if (!id) { location.href = '/'; return; }

    var data;
    try { data = await api('GET', 'stories/' + id); }
    catch (e) { document.getElementById('content').innerHTML = '<p class="empty">' + e.message + '</p>'; return; }

    storyId = data.story.id;
    plots = data.plots;
    points = (data.chartPoints || []).map(function(cp) {
      return { plot_id: cp.plot_id, x: cp.x_pos, y: cp.y_val, label: cp.label || '' };
    });

    var storyTitle = data.story.title || 'Untitled';
    var isOwner = data.isOwner;
    isOwnerGlobal = isOwner;

    var borderColor = isOwner ? '#8ab' : '#b8c4cc';
    var bgColor = isOwner ? '#eef4fb' : '#f4f6f8';

    document.getElementById('content').innerHTML =
      '<div id="title-row" style="display:flex;align-items:center;gap:8px">' +
        '<h1 id="title-text" style="margin:0">' + esc(storyTitle) + '</h1>' +
        (isOwner ? '<button class="btn btn-sm" id="edit-btn">edit</button>' : '') +
      '</div>' +
      '<div id="title-edit" style="display:none;margin-bottom:0.5em">' +
        '<div style="display:flex;gap:6px;align-items:center">' +
          '<input id="title-input" type="text" maxlength="' + MAX_TITLE + '" style="min-width:0;flex:1;font-size:1.1em;font-weight:700;padding:4px 8px;border:1.5px solid #0969da;border-radius:6px;font-family:inherit">' +
          '<button class="btn btn-sm btn-primary" id="ok-btn" style="flex-shrink:0">ok</button>' +
          '<button class="btn btn-sm btn-danger" id="del-btn" style="flex-shrink:0">del</button>' +
        '</div>' +
      '</div>' +
      '<div class="chart-wrap" style="margin-top:12px;width:100%;aspect-ratio:1;border:1.5px solid ' + borderColor + ';border-radius:6px;overflow:hidden;background:' + bgColor + '">' +
        '<canvas id="c" style="width:100%;height:100%;display:block;touch-action:none;cursor:' + (isOwner ? 'grab' : 'default') + '"></canvas>' +
      '</div>' +
      '<div id="info" style="text-align:center;margin-top:10px;min-height:3em"></div>';

    // Inline title edit
    if (isOwner) {
      var titleRow = document.getElementById('title-row');
      var titleEdit = document.getElementById('title-edit');
      var titleInput = document.getElementById('title-input');
      var titleText = document.getElementById('title-text');

      document.getElementById('edit-btn').onclick = function() {
        titleInput.value = storyTitle;
        titleRow.style.display = 'none';
        titleEdit.style.display = 'block';
        titleInput.focus();
        titleInput.select();
      };

      function saveTitle() {
        var v = titleInput.value.trim().slice(0, MAX_TITLE).replace(/<[^>]*>/g, '');
        if (!v) v = 'Untitled';
        titleEdit.style.display = 'none';
        titleRow.style.display = 'flex';
        if (v !== storyTitle) {
          storyTitle = v;
          titleText.textContent = v;
          api('PUT', 'stories/' + storyId, { title: v });
        }
      }

      document.getElementById('ok-btn').onclick = saveTitle;

      titleInput.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') { e.preventDefault(); saveTitle(); }
        if (e.key === 'Escape') { titleEdit.style.display = 'none'; titleRow.style.display = 'flex'; }
      });

      document.getElementById('del-btn').onclick = function() {
        if (confirm('Delete this story and all its data?')) {
          api('DELETE', 'stories/' + storyId).then(function() { location.href = '/'; });
        }
      };
    }

    canvas = document.getElementById('c');
    ctx = canvas.getContext('2d');
    draw(); updateInfo();
    window.addEventListener('resize', draw);

    canvas.addEventListener('mousedown', onStart);
    canvas.addEventListener('touchstart', onStart, { passive: false });
    window.addEventListener('mousemove', onMove);
    window.addEventListener('touchmove', onMove, { passive: false });
    window.addEventListener('mouseup', onEnd);
    window.addEventListener('touchend', onEnd);
    canvas.addEventListener('click', onClick);
  })();
  </script>
</body>
</html>
