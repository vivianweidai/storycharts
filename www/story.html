<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Story Charts</title>
  <link rel="stylesheet" href="/app.css">
  <link rel="icon" href="/favicon.ico">
  <style>
    @media (min-width: 600px) {
      .chart-wrap { aspect-ratio: 1.618 / 1 !important; }
    }
  </style>
</head>
<body>
  <div class="header" id="header"></div>
  <div id="content"><p class="empty">Loading...</p></div>

  <script src="/app.js"></script>
  <script>
  var COLORS = ['#4a7fd4','#e06040','#50a040','#d4a020','#9060c0','#2a9d8f','#e07098','#8a6540','#5050b0','#e08050'];
  var MAX_TITLE = 60, MAX_PLOTS = 10, MAX_POINTS = 100;
  function esc(s) { var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
  var storyId, plots, points;
  var canvas, ctx, W, H, PAD = 20;
  var selDi = -1, selPi = -1;
  var dragPt = null, isDragging = false, didMove = false;
  var hoverDi = -1, hoverPi = -1; // hover state
  var playing = false, playX = -1, playRAF = null, playHighlight = null, playStart = 0; // playback
  var PLAY_PAUSE_MIN = 3000, PLAY_PAUSE_MAX = 6000; // pause range based on label length
  var PLAY_SWEEP_MS = 1500; // sweep between TPs

  function plotColor(di) { var p = plots[di]; return COLORS[(p && p.color >= 0) ? p.color % COLORS.length : di % COLORS.length]; }
  function toX(v) { return PAD + (v / 10000) * (W - 2 * PAD); }
  function toY(v) { return PAD + (1 - v / 10000) * (H - 2 * PAD); }
  function fromX(px) { return Math.max(0, Math.min(10000, Math.round(((px - PAD) / (W - 2 * PAD)) * 10000))); }
  function fromY(py) { return Math.max(0, Math.min(10000, Math.round((1 - (py - PAD) / (H - 2 * PAD)) * 10000))); }

  function grouped() {
    var g = [];
    for (var i = 0; i < plots.length; i++) g.push([]);
    for (var i = 0; i < points.length; i++) {
      for (var d = 0; d < plots.length; d++) {
        if (plots[d].id === points[i].plot_id) { g[d].push(points[i]); break; }
      }
    }
    for (var d = 0; d < g.length; d++) g[d].sort(function(a,b){ return a.x - b.x; });
    return g;
  }

  function draw() {
    var dpr = window.devicePixelRatio || 1;
    var rect = canvas.getBoundingClientRect();
    canvas.width = rect.width * dpr; canvas.height = rect.height * dpr;
    ctx.scale(dpr, dpr);
    W = rect.width; H = rect.height;

    // Grid
    ctx.strokeStyle = 'rgba(70,120,180,0.15)'; ctx.lineWidth = 0.5;
    for (var i = 0; i <= 20; i++) {
      var x = PAD + (i / 20) * (W - 2 * PAD);
      ctx.beginPath(); ctx.moveTo(x, PAD); ctx.lineTo(x, H - PAD); ctx.stroke();
    }
    for (var i = 0; i <= 20; i++) {
      var y = PAD + (i / 20) * (H - 2 * PAD);
      if (i === 10) { ctx.strokeStyle = 'rgba(70,120,180,0.35)'; ctx.lineWidth = 1; }
      ctx.beginPath(); ctx.moveTo(PAD, y); ctx.lineTo(W - PAD, y); ctx.stroke();
      if (i === 10) { ctx.strokeStyle = 'rgba(70,120,180,0.15)'; ctx.lineWidth = 0.5; }
    }

    var g = grouped();

    // Playback vertical line
    if (playing && playX >= 0) {
      var lx = toX(playX);
      ctx.strokeStyle = 'rgba(9,105,218,0.35)';
      ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(lx, PAD); ctx.lineTo(lx, H - PAD); ctx.stroke();
    }

    // Halo on selected/dragged/playback-highlighted point
    var halos = [];
    if (dragPt && selDi >= 0) {
      halos.push({ x: dragPt.x, y: dragPt.y, di: selDi });
    } else if (selDi >= 0 && selPi >= 0 && g[selDi] && g[selDi][selPi]) {
      halos.push({ x: g[selDi][selPi].x, y: g[selDi][selPi].y, di: selDi });
    }
    if (playHighlight && g[playHighlight.di] && g[playHighlight.di][playHighlight.pi]) {
      var ph = g[playHighlight.di][playHighlight.pi];
      halos.push({ x: ph.x, y: ph.y, di: playHighlight.di });
    }
    for (var hi = 0; hi < halos.length; hi++) {
      var h = halos[hi];
      var color = plotColor(h.di);
      ctx.fillStyle = color + '15';
      ctx.beginPath(); ctx.arc(toX(h.x), toY(h.y), 22, 0, Math.PI * 2); ctx.fill();
      ctx.strokeStyle = color + '40'; ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.arc(toX(h.x), toY(h.y), 22, 0, Math.PI * 2); ctx.stroke();
    }

    // Lines
    ctx.lineJoin = 'round'; ctx.lineCap = 'round';
    for (var d = 0; d < g.length; d++) {
      var pts = g[d]; if (pts.length < 2) continue;
      ctx.strokeStyle = plotColor(d);
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(toX(pts[0].x), toY(pts[0].y));
      for (var i = 1; i < pts.length; i++) ctx.lineTo(toX(pts[i].x), toY(pts[i].y));
      ctx.stroke();
    }
    ctx.lineJoin = 'miter'; ctx.lineCap = 'butt';

    // Points
    for (var d = 0; d < g.length; d++) {
      for (var i = 0; i < g[d].length; i++) {
        var isHover = (d === hoverDi && i === hoverPi);
        var isPlayHL = (playHighlight && playHighlight.di === d && playHighlight.pi === i);
        var r = (isHover || isPlayHL) ? 7 : 5;
        ctx.fillStyle = plotColor(d);
        ctx.beginPath();
        ctx.arc(toX(g[d][i].x), toY(g[d][i].y), r, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    // Tooltip for hover or playback highlight
    var tipPt = null, tipDi = -1;
    if (playHighlight && g[playHighlight.di] && g[playHighlight.di][playHighlight.pi]) {
      tipPt = g[playHighlight.di][playHighlight.pi];
      tipDi = playHighlight.di;
    } else if (hoverDi >= 0 && hoverPi >= 0 && g[hoverDi] && g[hoverDi][hoverPi]) {
      tipPt = g[hoverDi][hoverPi];
      tipDi = hoverDi;
    }

    if (tipPt) {
      var label = tipPt.label || 'Turning point';
      drawTooltip(toX(tipPt.x), toY(tipPt.y), label, tipDi);
    }
  }

  function drawTooltip(px, py, text, di) {
    ctx.font = '12px -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif';
    var tw = ctx.measureText(text).width;
    var pad = 6, h = 22;
    var tx = px - tw / 2 - pad;
    var ty = py - 32;
    // Keep in bounds
    if (tx < 2) tx = 2;
    if (tx + tw + pad * 2 > W - 2) tx = W - tw - pad * 2 - 2;
    if (ty < 2) { ty = py + 14; }

    ctx.fillStyle = 'rgba(255,255,255,0.92)';
    ctx.strokeStyle = plotColor(di) + '60';
    ctx.lineWidth = 1;
    roundRect(ctx, tx, ty, tw + pad * 2, h, 4);
    ctx.fill(); ctx.stroke();

    ctx.fillStyle = '#1f2328';
    ctx.textBaseline = 'middle';
    ctx.fillText(text, tx + pad, ty + h / 2);
  }

  function roundRect(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
  }

  // Hit test
  function hitPoint(cx, cy) {
    var g = grouped();
    var best = null, bestD = 22;
    for (var d = 0; d < g.length; d++) {
      for (var i = 0; i < g[d].length; i++) {
        var dx = toX(g[d][i].x) - cx, dy = toY(g[d][i].y) - cy;
        var dist = Math.sqrt(dx*dx + dy*dy);
        if (dist < bestD) { bestD = dist; best = { di: d, pi: i, pt: g[d][i] }; }
      }
    }
    return best;
  }

  function getPos(e) {
    var t = e.touches ? e.touches[0] : e;
    var r = canvas.getBoundingClientRect();
    return { x: t.clientX - r.left, y: t.clientY - r.top };
  }

  function onStart(e) {
    if (isDragging) return;
    if (!isOwnerGlobal) return;
    var pos = getPos(e);
    var hit = hitPoint(pos.x, pos.y);
    if (!hit) return;
    e.preventDefault();
    stopPlayback();
    isDragging = true; didMove = false;
    infoEditing = false;
    dragPt = hit.pt;
    selDi = hit.di; selPi = hit.pi;
    draw(); updateInfo();
  }

  function onMove(e) {
    if (isDragging && dragPt) {
      e.preventDefault(); didMove = true;
      var pos = getPos(e);
      dragPt.x = fromX(pos.x); dragPt.y = fromY(pos.y);
      draw(); updateInfo();
      return;
    }
    // Hover detection (mouse only)
    if (e.touches) return;
    var pos = getPos(e);
    var oldDi = hoverDi, oldPi = hoverPi;
    var hit = hitPoint(pos.x, pos.y);
    if (hit) {
      hoverDi = hit.di; hoverPi = hit.pi;
      canvas.style.cursor = isOwnerGlobal ? 'grab' : 'pointer';
      if (playing) stopPlayback();
      // Persist selection so it stays when mouse leaves
      selDi = hit.di; selPi = hit.pi;
    } else {
      hoverDi = -1; hoverPi = -1;
      canvas.style.cursor = isOwnerGlobal ? 'grab' : 'default';
    }
    if (hoverDi !== oldDi || hoverPi !== oldPi) { draw(); updateInfo(); }
  }

  function onEnd() {
    if (!isDragging) return;
    isDragging = false;
    if (didMove) {
      selDi = -1; selPi = -1;
      draw(); updateInfo();
      savePoints();
    }
    dragPt = null;
  }

  function onClick(e) {
    if (didMove) { didMove = false; return; }
    infoEditing = false;
    var pos = getPos(e);
    var hit = hitPoint(pos.x, pos.y);
    if (hit) {
      if (playing) stopPlayback();
      if (!isDragging) { selDi = hit.di; selPi = hit.pi; draw(); updateInfo(); }
      return;
    }
    selDi = -1; selPi = -1; draw(); updateInfo();
  }

  // --- Playback ---
  function getAllPointsSorted() {
    var g = grouped();
    var all = [];
    for (var d = 0; d < g.length; d++) {
      for (var i = 0; i < g[d].length; i++) {
        all.push({ di: d, pi: i, x: g[d][i].x, label: g[d][i].label || '' });
      }
    }
    all.sort(function(a, b) { return a.x - b.x; });
    return all;
  }

  var playSegments = []; // [{startX, endX, startTime, sweepEnd, pauseEnd}]

  function pauseForLabel(label) {
    // 0 chars = 3s, 60 chars = 6s, linear
    var len = (label || '').length;
    var t = Math.min(len / 60, 1);
    return PLAY_PAUSE_MIN + t * (PLAY_PAUSE_MAX - PLAY_PAUSE_MIN);
  }

  function buildPlaySegments() {
    var allPts = getAllPointsSorted();
    if (allPts.length === 0) return [];
    var segs = [];
    var t = 0;
    // Sweep from 0 to first TP
    var firstX = allPts[0].x;
    var sweepDur = firstX > 0 ? PLAY_SWEEP_MS * (firstX / 10000) : 0;
    var pause = pauseForLabel(allPts[0].label);
    segs.push({ startX: 0, endX: firstX, pt: allPts[0], startTime: t, sweepEnd: t + sweepDur, pauseEnd: t + sweepDur + pause });
    t = segs[0].pauseEnd;
    // Between TPs
    for (var i = 1; i < allPts.length; i++) {
      var dist = allPts[i].x - allPts[i - 1].x;
      sweepDur = PLAY_SWEEP_MS * (dist / 10000);
      pause = pauseForLabel(allPts[i].label);
      segs.push({ startX: allPts[i - 1].x, endX: allPts[i].x, pt: allPts[i], startTime: t, sweepEnd: t + sweepDur, pauseEnd: t + sweepDur + pause });
      t = segs[i].pauseEnd;
    }
    // Final sweep to end
    var lastX = allPts[allPts.length - 1].x;
    if (lastX < 10000) {
      sweepDur = PLAY_SWEEP_MS * ((10000 - lastX) / 10000);
      segs.push({ startX: lastX, endX: 10000, pt: null, startTime: t, sweepEnd: t + sweepDur, pauseEnd: t + sweepDur });
      t = segs[segs.length - 1].pauseEnd;
    }
    return segs;
  }

  function startPlayback() {
    playSegments = buildPlaySegments();
    if (playSegments.length === 0) return;
    playing = true;
    playHighlight = null;

    // If a TP is selected (via hover on read-only), start from its segment
    var offset = 0;
    var startDi = hoverDi >= 0 ? hoverDi : selDi;
    var startPi = hoverPi >= 0 ? hoverPi : selPi;
    if (startDi >= 0 && startPi >= 0) {
      for (var i = 0; i < playSegments.length; i++) {
        var seg = playSegments[i];
        if (seg.pt && seg.pt.di === startDi && seg.pt.pi === startPi) {
          offset = seg.sweepEnd; // start at the pause phase of this TP
          break;
        }
      }
    }
    selDi = -1; selPi = -1;
    playStart = performance.now() - offset;
    updatePlayBtn();
    playTick();
  }

  function playTick() {
    if (!playing) return;
    var elapsed = performance.now() - playStart;
    var totalDur = playSegments[playSegments.length - 1].pauseEnd;
    if (elapsed >= totalDur) { stopPlayback(); return; }

    // Find current segment
    var seg = null;
    for (var i = 0; i < playSegments.length; i++) {
      if (elapsed < playSegments[i].pauseEnd) { seg = playSegments[i]; break; }
    }
    if (!seg) { stopPlayback(); return; }

    if (elapsed < seg.sweepEnd) {
      // Sweeping
      var segElapsed = elapsed - seg.startTime;
      var segDur = seg.sweepEnd - seg.startTime;
      var t = segDur > 0 ? segElapsed / segDur : 1;
      playX = Math.round(seg.startX + (seg.endX - seg.startX) * t);
      playHighlight = null;
    } else {
      // Paused at TP
      playX = seg.endX;
      playHighlight = seg.pt ? { di: seg.pt.di, pi: seg.pt.pi } : null;
    }

    draw();
    updatePlayInfo();
    playRAF = requestAnimationFrame(playTick);
  }

  function updatePlayInfo() {
    var el = document.getElementById('info');
    if (!el) return;
    if (playHighlight) {
      var g = grouped();
      var pt = g[playHighlight.di] && g[playHighlight.di][playHighlight.pi];
      if (pt) {
        var color = plotColor(playHighlight.di);
        var plot = plots[playHighlight.di];
        el.innerHTML =
          '<div style="text-align:center">' +
            '<div style="color:' + color + ';font-weight:600">' + esc(plot ? plot.title : '') + '</div>' +
            '<div style="font-size:0.9em;color:#555;margin-top:2px">' + esc(pt.label || 'Turning point') + '</div>' +
          '</div>';
        return;
      }
    }
    el.innerHTML = '';
  }

  function stopPlayback() {
    playing = false;
    playX = -1;
    playHighlight = null;
    if (playRAF) { cancelAnimationFrame(playRAF); playRAF = null; }
    updatePlayBtn();
    draw();
    updateInfo();
  }

  function togglePlayback() {
    if (playing) stopPlayback();
    else startPlayback();
  }

  function updatePlayBtn() {
    var btn = document.getElementById('play-btn');
    if (btn) btn.textContent = playing ? 'pause' : 'play';
  }

  var isOwnerGlobal = false;
  var infoEditing = false;

  function updateInfo() {
    var el = document.getElementById('info');
    if (infoEditing) return;
    if (playing) { updatePlayInfo(); return; }

    // Use hover state for read-only, selection state for owner
    var di = selDi >= 0 ? selDi : (!isOwnerGlobal ? hoverDi : -1);
    var pi = selDi >= 0 ? selPi : (!isOwnerGlobal ? hoverPi : -1);

    if (di < 0) {
      el.innerHTML = '';
      return;
    }

    var color = plotColor(di);
    var plot = plots[di];

    var g = grouped();
    var pt = (pi >= 0 && g[di]) ? g[di][pi] : null;
    el.innerHTML =
      '<div style="text-align:center">' +
        '<div style="color:' + color + ';font-weight:600">' + esc(plot.title) +
          (isOwnerGlobal ? ' <button class="btn btn-sm" id="info-edit-btn" style="margin-left:6px">edit</button>' : '') +
        '</div>' +
        (pt ? '<div style="font-size:0.9em;color:#555;margin-top:2px">' + esc(pt.label || 'Turning point') + '</div>' : '') +
      '</div>';
    if (isOwnerGlobal && pt) document.getElementById('info-edit-btn').onclick = function() { editTP(selDi, selPi); };
  }

  function editTP(di, pi) {
    infoEditing = true;
    var el = document.getElementById('info');
    var g = grouped();
    var pt = g[di][pi];
    var plot = plots[di];
    var color = plotColor(di);
    var selColorIdx = (plot.color >= 0) ? plot.color : di;
    var swatches = '';
    for (var ci = 0; ci < COLORS.length; ci++) {
      var sel = (ci === selColorIdx);
      swatches += '<span class="color-swatch" data-ci="' + ci + '" style="display:inline-block;width:22px;height:22px;border-radius:50%;background:' + COLORS[ci] + ';cursor:pointer;border:2.5px solid ' + (sel ? '#1f2328' : 'transparent') + ';margin:0 2px;vertical-align:middle"></span>';
    }
    el.innerHTML =
      '<div style="display:flex;gap:6px;align-items:center;margin-bottom:6px">' +
        '<input id="ie-name" type="text" maxlength="40" value="' + esc(plot.title) + '" placeholder="Plot name" style="min-width:0;flex:1;padding:4px 8px;border:1.5px solid ' + color + ';border-radius:6px;font-size:16px;font-family:inherit;font-weight:600;color:' + color + '">' +
        '<button class="btn btn-sm btn-danger" id="ie-del-plot" style="flex-shrink:0" title="Delete plot">del plot</button>' +
      '</div>' +
      '<div style="text-align:center;margin-bottom:6px">' + swatches + '</div>' +
      '<div style="display:flex;gap:6px;align-items:center">' +
        '<input id="ie-label" type="text" maxlength="60" value="' + esc(pt.label || '') + '" placeholder="TP label" style="min-width:0;flex:1;padding:4px 8px;border:1px solid #d1d9e0;border-radius:6px;font-size:16px;font-family:inherit">' +
        '<button class="btn btn-sm btn-danger" id="ie-del-tp" style="flex-shrink:0" title="Delete turning point">del tp</button>' +
      '</div>' +
      '<div style="text-align:center;margin-top:6px">' +
        '<button class="btn btn-sm btn-primary" id="ie-ok">ok</button>' +
        ' <button class="btn btn-sm" id="ie-add-tp">+ tp</button>' +
      '</div>';
    // Wire color swatches
    var allSwatches = el.querySelectorAll('.color-swatch');
    for (var si = 0; si < allSwatches.length; si++) {
      allSwatches[si].onclick = function() {
        selColorIdx = parseInt(this.getAttribute('data-ci'));
        for (var j = 0; j < allSwatches.length; j++) {
          allSwatches[j].style.border = '2.5px solid transparent';
        }
        this.style.border = '2.5px solid #1f2328';
        // Live preview: update plot color and redraw chart
        plot.color = selColorIdx;
        var newColor = plotColor(di);
        var nameInput = document.getElementById('ie-name');
        nameInput.style.borderColor = newColor;
        nameInput.style.color = newColor;
        draw();
      };
    }
    document.getElementById('ie-label').focus();
    document.getElementById('ie-ok').onclick = function() {
      var name = document.getElementById('ie-name').value.trim().replace(/<[^>]*>/g, '').slice(0, 40) || 'Plot';
      pt.label = document.getElementById('ie-label').value.trim().replace(/<[^>]*>/g, '').slice(0, 60);
      plot.color = selColorIdx;
      plot.title = name;
      api('PUT', 'plots/' + plot.id, { title: name, color: selColorIdx });
      infoEditing = false; draw(); updateInfo(); savePoints();
    };
    document.getElementById('ie-del-plot').onclick = function() {
      if (!confirm('Delete plot "' + plot.title + '" and all its turning points?')) return;
      api('DELETE', 'plots/' + plot.id);
      points = points.filter(function(p) { return p.plot_id !== plot.id; });
      plots.splice(di, 1);
      selDi = -1; selPi = -1; infoEditing = false;
      draw(); updateInfo(); updateAddPlotBtn();
    };
    document.getElementById('ie-del-tp').onclick = function() {
      if (!confirm('Delete this turning point?')) return;
      var idx = points.indexOf(pt);
      if (idx >= 0) points.splice(idx, 1);
      selDi = -1; selPi = -1; infoEditing = false;
      draw(); updateInfo(); savePoints();
    };
    var addTpBtn = document.getElementById('ie-add-tp');
    addTpBtn.disabled = points.length >= MAX_POINTS;
    addTpBtn.onclick = function() {
      if (points.length >= MAX_POINTS) { alert('Maximum ' + MAX_POINTS + ' turning points per story. Delete some to make room.'); return; }
      addTP(di);
      infoEditing = false;
    };
  }

  function updateAddPlotBtn() {
    var btn = document.getElementById('add-plot-btn');
    if (!btn) return;
    var atLimit = plots.length >= MAX_PLOTS;
    btn.disabled = atLimit;
    btn.title = atLimit ? 'Maximum ' + MAX_PLOTS + ' plots' : '';
  }

  function addPlot() {
    if (plots.length >= MAX_PLOTS) { alert('Maximum ' + MAX_PLOTS + ' plots per story. Delete a plot to make room.'); return; }
    var names = ['Plot A','Plot B','Plot C','Plot D','Plot E','Plot F','Plot G','Plot H','Plot I','Plot J'];
    var name = names[plots.length % names.length];
    var ci = plots.length % COLORS.length;
    api('POST', 'stories/' + storyId + '/plots', { title: name, color: ci }).then(function(r) {
      plots.push({ id: r.id, title: name, color: ci });
      for (var i = 0; i < 3; i++) {
        points.push({ plot_id: r.id, x: Math.floor(Math.random() * 10001), y: Math.floor(Math.random() * 10001), label: 'New point' });
      }
      savePoints(); draw(); updateInfo(); updateAddPlotBtn();
    });
  }

  function addTP(di) {
    if (points.length >= MAX_POINTS) { alert('Maximum ' + MAX_POINTS + ' turning points per story. Delete some to make room.'); return; }
    var plot = plots[di];
    points.push({ plot_id: plot.id, x: 5000, y: 5000, label: 'New point' });
    savePoints(); draw(); updateInfo();
  }

  function savePoints() {
    var out = [];
    for (var i = 0; i < points.length; i++) {
      out.push({ plot_id: points[i].plot_id, x_pos: points[i].x, y_val: points[i].y, label: points[i].label || '' });
    }
    api('POST', 'stories/' + storyId + '/chartpoints', { points: out });
  }

  // --- Init ---
  (async function() {
    var user = await getUser();
    renderHeader(user);
    var id = new URLSearchParams(location.search).get('id');
    if (!id) { location.href = '/'; return; }

    var data;
    try { data = await api('GET', 'stories/' + id); }
    catch (e) { document.getElementById('content').innerHTML = '<p class="empty">' + e.message + '</p>'; return; }

    storyId = data.story.id;
    plots = data.plots;
    points = (data.chartPoints || []).map(function(cp) {
      return { plot_id: cp.plot_id, x: cp.x_pos, y: cp.y_val, label: cp.label || '' };
    });

    var storyTitle = data.story.title || 'Untitled';
    var isOwner = data.isOwner;
    isOwnerGlobal = isOwner;

    var borderColor = isOwner ? '#0969da' : '#8ab';
    var bgColor = '#eef4fb';

    document.getElementById('content').innerHTML =
      '<div id="title-row" style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">' +
        '<h1 id="title-text" style="margin:0">' + esc(storyTitle) + '</h1>' +
        (isOwner ? '<button class="btn btn-sm" id="edit-btn">edit</button>' : '') +
        '<span style="margin-left:auto;font-size:0.8em;display:flex;align-items:center;gap:8px">' +
          (isOwner ? '<button type="button" class="btn btn-sm btn-primary" id="add-plot-btn" style="font-size:0.85em">+ add plot</button>' :
                     '<button type="button" class="btn btn-sm" id="play-btn" style="font-size:0.85em">play</button>') +
        '</span>' +
      '</div>' +
      '<div id="title-edit" style="display:none;margin-bottom:0.5em">' +
        '<div style="display:flex;gap:6px;align-items:center">' +
          '<input id="title-input" type="text" maxlength="' + MAX_TITLE + '" style="min-width:0;flex:1;font-size:1.1em;font-weight:700;padding:4px 8px;border:1.5px solid #0969da;border-radius:6px;font-family:inherit">' +
          '<button class="btn btn-sm btn-primary" id="ok-btn" style="flex-shrink:0">ok</button>' +
          '<button class="btn btn-sm btn-danger" id="del-btn" style="flex-shrink:0">del</button>' +
        '</div>' +
      '</div>' +
      '<div class="chart-wrap" style="margin-top:20px;width:100%;aspect-ratio:1;border:1.5px solid ' + borderColor + ';border-radius:6px;overflow:hidden;background:' + bgColor + '">' +
        '<canvas id="c" style="width:100%;height:100%;display:block;touch-action:none;cursor:' + (isOwner ? 'grab' : 'default') + '"></canvas>' +
      '</div>' +
      '<div id="info" style="text-align:center;margin-top:24px;min-height:3em"></div>';

    // Top-right button
    if (isOwner) {
      document.getElementById('add-plot-btn').onclick = addPlot;
    } else {
      document.getElementById('play-btn').onclick = togglePlayback;
      setTimeout(function() { if (!playing) startPlayback(); }, 3000);
    }

    // Inline title edit
    if (isOwner) {
      var titleRow = document.getElementById('title-row');
      var titleEdit = document.getElementById('title-edit');
      var titleInput = document.getElementById('title-input');
      var titleText = document.getElementById('title-text');

      document.getElementById('edit-btn').onclick = function() {
        titleInput.value = storyTitle;
        titleRow.style.display = 'none';
        titleEdit.style.display = 'block';
        titleInput.focus();
        titleInput.select();
      };

      function saveTitle() {
        var v = titleInput.value.trim().slice(0, MAX_TITLE).replace(/<[^>]*>/g, '');
        if (!v) v = 'Untitled';
        titleEdit.style.display = 'none';
        titleRow.style.display = 'flex';
        if (v !== storyTitle) {
          storyTitle = v;
          titleText.textContent = v;
          api('PUT', 'stories/' + storyId, { title: v });
        }
      }

      document.getElementById('ok-btn').onclick = saveTitle;

      titleInput.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') { e.preventDefault(); saveTitle(); }
        if (e.key === 'Escape') { titleEdit.style.display = 'none'; titleRow.style.display = 'flex'; }
      });

      document.getElementById('del-btn').onclick = function() {
        if (confirm('Delete this story and all its data?')) {
          api('DELETE', 'stories/' + storyId).then(function() { location.href = '/'; });
        }
      };
    }

    canvas = document.getElementById('c');
    ctx = canvas.getContext('2d');
    draw(); updateInfo(); updateAddPlotBtn();
    window.addEventListener('resize', draw);

    canvas.addEventListener('mousedown', onStart);
    canvas.addEventListener('touchstart', onStart, { passive: false });
    window.addEventListener('mousemove', onMove);
    window.addEventListener('touchmove', onMove, { passive: false });
    window.addEventListener('mouseup', onEnd);
    window.addEventListener('touchend', onEnd);
    canvas.addEventListener('click', onClick);
    canvas.addEventListener('mouseleave', function() {
      if (hoverDi >= 0) { hoverDi = -1; hoverPi = -1; draw(); }
    });

    window.addEventListener('keydown', function(e) {
      if (!isOwnerGlobal || infoEditing || isDragging || playing) return;
      if (e.key === 'Delete' || e.key === 'Backspace') {
        if (selDi < 0 || selPi < 0) return;
        // Don't intercept if user is typing in an input
        var tag = document.activeElement && document.activeElement.tagName;
        if (tag === 'INPUT' || tag === 'TEXTAREA') return;
        e.preventDefault();
        var g = grouped();
        var pt = g[selDi] && g[selDi][selPi];
        if (!pt) return;
        var idx = points.indexOf(pt);
        if (idx >= 0) points.splice(idx, 1);
        selDi = -1; selPi = -1;
        draw(); updateInfo(); savePoints();
      }
    });

  })();
  </script>
</body>
</html>
