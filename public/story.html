<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Story Charts</title>
  <link rel="stylesheet" href="/app.css">
  <link rel="icon" href="/favicon/favicon.ico">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-dragdata@latest/dist/chartjs-plugin-dragdata.min.js"></script>
</head>
<body>
  <div class="header" id="header"></div>
  <div id="content"><p class="empty">Loading...</p></div>

  <script src="/app.js"></script>
  <script>
    let storyData = null;
    let chartInstance = null;

    (async function() {
      const user = await getUser();
      renderHeader(user);

      const id = new URLSearchParams(location.search).get('id');
      if (!id) { location.href = '/'; return; }

      try {
        storyData = await api('GET', 'stories/' + id);
      } catch (e) {
        document.getElementById('content').innerHTML = '<p class="empty">' + e.message + '</p>';
        return;
      }

      render(storyData, user);
    })();

    function render(data, user) {
      const { story, plots, chartPoints, isOwner } = data;
      const content = document.getElementById('content');
      let html = '';

      // Title row
      html += '<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">';
      html += '<h1 style="margin:0">' + (story.title || 'Untitled') + '</h1>';
      if (isOwner) {
        html += '<button class="btn btn-sm" onclick="editStory()">edit</button>';
      }
      html += '</div>';

      // All 5 style previews
      const styleNames = ['Style 1: Clean Minimal', 'Style 2: Blueprint', 'Style 3: Dotted', 'Style 4: Major/Minor', 'Style 5: Dark Mode'];
      for (let i = 1; i <= 5; i++) {
        html += '<h2 style="margin:20px 0 4px;color:#656d76">' + styleNames[i-1] + '</h2>';
        html += '<div class="chart-preview" id="chart-style-' + i + '" style="height:300px"></div>';
      }

      // Context panel (hidden)
      html += '<div id="context-panel" class="context-panel" style="display:none"></div>';

      // Add buttons
      if (isOwner) {
        html += '<div class="actions" style="justify-content:center;margin-top:20px">';
        html += '<button class="btn btn-add" onclick="addPlot()">+ Add Plot</button>';
        html += '</div>';
      }

      content.innerHTML = html;

      if (plots.length) {
        for (let i = 1; i <= 5; i++) {
          renderPreviewChart(
            document.getElementById('chart-style-' + i),
            plots, chartPoints || [], i
          );
        }
      }
    }

    // --- Context panel ---

    function showContextPanel(datasetIndex, pointIndex) {
      const { plots, isOwner } = storyData;
      const plot = plots[datasetIndex];
      const pt = chartInstance.data.datasets[datasetIndex].data[pointIndex];
      const color = PLOT_COLORS[datasetIndex % PLOT_COLORS.length];

      const panel = document.getElementById('context-panel');
      let html = '<div class="context-inner">';
      html += '<div class="context-row">';
      html += '<span class="context-plot" style="color:' + color + '">' + (plot.title || 'Plot') + '</span>';
      html += '<span class="context-value">x=' + pt.x + '  y=' + pt.y + '</span>';
      html += '</div>';
      if (isOwner) {
        html += '<div class="context-actions">';
        html += '<button class="btn btn-sm" onclick="editPlot(' + plot.id + ')">edit plot</button>';
        html += '<button class="btn btn-sm context-close" onclick="hideContextPanel()">close</button>';
        html += '</div>';
      }
      if (plot.description) {
        html += '<div class="context-details">' + plot.description + '</div>';
      }
      html += '</div>';
      panel.innerHTML = html;
      panel.style.display = 'block';
    }

    function hideContextPanel() {
      document.getElementById('context-panel').style.display = 'none';
    }

    // --- Chart auto-save ---

    async function autoSaveChart() {
      if (!chartInstance) return;
      const points = [];
      const plots = storyData.plots;
      for (let di = 0; di < plots.length; di++) {
        const data = chartInstance.data.datasets[di].data;
        for (const pt of data) {
          points.push({ plot_id: plots[di].id, x_pos: pt.x, y_val: pt.y });
        }
      }
      await api('POST', 'stories/' + storyData.story.id + '/chartpoints', { points });
    }

    // --- Story CRUD ---

    function editStory() {
      const s = storyData.story;
      showModal('Edit Story', [
        { name: 'title', label: 'Title', type: 'text', value: s.title }
      ], async (data) => {
        await api('PUT', 'stories/' + s.id, { title: data.title });
        location.reload();
      }, async () => {
        await api('DELETE', 'stories/' + s.id);
        location.href = '/';
      });
    }

    // --- Plot CRUD ---

    function addPlot() {
      showModal('New Plot', [
        { name: 'title', label: 'Title', type: 'text' },
        { name: 'description', label: 'Description', type: 'textarea' }
      ], async (data) => {
        await api('POST', 'stories/' + storyData.story.id + '/plots', data);
        location.reload();
      });
    }

    function editPlot(plotId) {
      const p = storyData.plots.find(x => x.id === plotId);
      showModal('Edit Plot', [
        { name: 'title', label: 'Title', type: 'text', value: p.title },
        { name: 'description', label: 'Description', type: 'textarea', value: p.description }
      ], async (data) => {
        await api('PUT', 'plots/' + plotId, data);
        location.reload();
      }, async () => {
        await api('DELETE', 'plots/' + plotId);
        location.reload();
      });
    }
  </script>
</body>
</html>
