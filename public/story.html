<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Story Charts</title>
  <link rel="stylesheet" href="/app.css">
  <link rel="icon" href="/favicon/favicon.ico">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-dragdata@latest/dist/chartjs-plugin-dragdata.min.js"></script>
</head>
<body>
  <div class="header" id="header"></div>
  <div id="content"><p class="empty">Loading...</p></div>

  <script src="/app.js"></script>
  <script>
    let storyData = null;
    let chartInstance = null;

    (async function() {
      const user = await getUser();
      renderHeader(user);

      const id = new URLSearchParams(location.search).get('id');
      if (!id) { location.href = '/'; return; }

      try {
        storyData = await api('GET', 'stories/' + id);
      } catch (e) {
        document.getElementById('content').innerHTML = '<p class="empty">' + e.message + '</p>';
        return;
      }

      render(storyData, user);
    })();

    function render(data, user) {
      const { story, plots, scenes, turningPoints, isOwner } = data;
      const content = document.getElementById('content');
      let html = '';

      // Title row with edit (includes delete)
      html += '<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">';
      html += '<h1 style="margin:0">' + (story.title || 'Untitled') + '</h1>';
      if (isOwner) {
        html += '<button class="btn btn-sm" onclick="editStory()">edit</button>';
      }
      html += '</div>';

      // Chart area
      html += '<div class="chart-container" id="chart-area" style="height:400px;margin:16px 0">';
      if (!plots.length && !scenes.length) {
        html += '<p class="empty">Add plots and scenes to build your chart.</p>';
      }
      html += '</div>';

      // Context panel (hidden initially, shown on point tap)
      html += '<div id="context-panel" class="context-panel" style="display:none"></div>';

      // Add buttons
      if (isOwner) {
        html += '<div class="actions" style="justify-content:center">';
        html += '<button class="btn btn-add" onclick="addPlot()">+ Add Plot</button>';
        html += '<button class="btn btn-add" onclick="addScene()">+ Add Scene</button>';
        html += '</div>';
      }

      content.innerHTML = html;

      // Render the draggable chart if we have plots and scenes
      if (plots.length && scenes.length) {
        chartInstance = renderDraggableChart(
          document.getElementById('chart-area'),
          plots, scenes, turningPoints,
          () => autoSaveChart()
        );

        // Click handler for context panel
        chartInstance.options.onClick = function(e) {
          const points = chartInstance.getElementsAtEventForMode(e, 'nearest', { intersect: true }, false);
          if (points.length) {
            const pt = points[0];
            showContextPanel(pt.datasetIndex, pt.index);
          } else {
            hideContextPanel();
          }
        };
      }
    }

    // --- Context panel ---

    function showContextPanel(datasetIndex, sceneIndex) {
      const { plots, scenes, turningPoints, isOwner } = storyData;
      const plot = plots[datasetIndex];
      const scene = scenes[sceneIndex];
      const key = plot.id + '-' + scene.id;
      const value = chartInstance._tpMap[key] != null ? chartInstance._tpMap[key] : 0;
      const color = PLOT_COLORS[datasetIndex % PLOT_COLORS.length];

      const panel = document.getElementById('context-panel');
      let html = '<div class="context-inner">';
      html += '<div class="context-row">';
      html += '<span class="context-plot" style="color:' + color + '">' + (plot.title || 'Plot') + '</span>';
      html += '<span class="context-sep">&times;</span>';
      html += '<span class="context-scene">' + (scene.title || 'Scene') + '</span>';
      html += '<span class="context-value">= ' + value + '</span>';
      html += '</div>';
      if (isOwner) {
        html += '<div class="context-actions">';
        html += '<button class="btn btn-sm" onclick="editPlot(' + plot.id + ')">edit plot</button>';
        html += '<button class="btn btn-sm" onclick="editScene(' + scene.id + ')">edit scene</button>';
        html += '<button class="btn btn-sm context-close" onclick="hideContextPanel()">close</button>';
        html += '</div>';
      }
      if (plot.description || scene.description) {
        html += '<div class="context-details">';
        if (plot.description) html += '<div><strong style="color:' + color + '">Plot:</strong> ' + plot.description + '</div>';
        if (scene.description) html += '<div><strong>Scene:</strong> ' + scene.description + '</div>';
        html += '</div>';
      }
      html += '</div>';
      panel.innerHTML = html;
      panel.style.display = 'block';
    }

    function hideContextPanel() {
      document.getElementById('context-panel').style.display = 'none';
    }

    // --- Chart auto-save ---

    async function autoSaveChart() {
      if (!chartInstance || !chartInstance._tpMap) return;
      const tpMap = chartInstance._tpMap;
      const tps = [];
      for (const plot of storyData.plots) {
        for (const scene of storyData.scenes) {
          const key = plot.id + '-' + scene.id;
          tps.push({
            plot_id: plot.id,
            scene_id: scene.id,
            tp_type: String(tpMap[key] != null ? tpMap[key] : 0)
          });
        }
      }
      await api('POST', 'stories/' + storyData.story.id + '/turningpoints', { turningPoints: tps });
    }

    // --- Story CRUD ---

    function editStory() {
      const s = storyData.story;
      showModal('Edit Story', [
        { name: 'title', label: 'Title', type: 'text', value: s.title },
        { name: 'summary', label: 'Summary', type: 'textarea', value: s.summary }
      ], async (data) => {
        await api('PUT', 'stories/' + s.id, { title: data.title, summary: data.summary });
        location.reload();
      }, async () => {
        await api('DELETE', 'stories/' + s.id);
        location.href = '/';
      });
    }

    // --- Plot CRUD ---

    function addPlot() {
      showModal('New Plot', [
        { name: 'title', label: 'Title', type: 'text' },
        { name: 'description', label: 'Description', type: 'textarea' }
      ], async (data) => {
        await api('POST', 'stories/' + storyData.story.id + '/plots', data);
        location.reload();
      });
    }

    function editPlot(plotId) {
      const p = storyData.plots.find(x => x.id === plotId);
      showModal('Edit Plot', [
        { name: 'title', label: 'Title', type: 'text', value: p.title },
        { name: 'description', label: 'Description', type: 'textarea', value: p.description }
      ], async (data) => {
        await api('PUT', 'plots/' + plotId, data);
        location.reload();
      }, async () => {
        await api('DELETE', 'plots/' + plotId);
        location.reload();
      });
    }

    // --- Scene CRUD ---

    function addScene() {
      showModal('New Scene', [
        { name: 'title', label: 'Title', type: 'text' },
        { name: 'description', label: 'Description', type: 'textarea' }
      ], async (data) => {
        await api('POST', 'stories/' + storyData.story.id + '/scenes', data);
        location.reload();
      });
    }

    function editScene(sceneId) {
      const s = storyData.scenes.find(x => x.id === sceneId);
      showModal('Edit Scene', [
        { name: 'title', label: 'Title', type: 'text', value: s.title },
        { name: 'description', label: 'Description', type: 'textarea', value: s.description }
      ], async (data) => {
        await api('PUT', 'scenes/' + sceneId, data);
        location.reload();
      }, async () => {
        await api('DELETE', 'scenes/' + sceneId);
        location.reload();
      });
    }
  </script>
</body>
</html>
