<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Story Charts</title>
  <link rel="stylesheet" href="/app.css">
  <link rel="icon" href="/favicon/favicon.ico">
</head>
<body>
  <div class="header" id="header"></div>
  <div id="content"><p class="empty">Loading...</p></div>

  <script src="/app.js"></script>
  <script>
  var COLORS = ['#4a7fd4','#e06040','#50a040','#d4a020','#9060c0'];
  var storyId, plots, points; // points: [{plot_id, x, y}] in 0-10000
  var canvas, ctx, W, H, PAD = 20;
  var selDi = -1, selPi = -1;
  var dragPt = null, isDragging = false, didMove = false;

  // Convert 0-10000 data coords to canvas pixel coords
  function toX(v) { return PAD + (v / 10000) * (W - 2 * PAD); }
  function toY(v) { return PAD + (1 - v / 10000) * (H - 2 * PAD); }
  // Canvas pixel coords to 0-10000 data coords
  function fromX(px) { return Math.max(0, Math.min(10000, Math.round(((px - PAD) / (W - 2 * PAD)) * 10000))); }
  function fromY(py) { return Math.max(0, Math.min(10000, Math.round((1 - (py - PAD) / (H - 2 * PAD)) * 10000))); }

  // Group points by plot index
  function grouped() {
    var g = [];
    for (var i = 0; i < plots.length; i++) g.push([]);
    for (var i = 0; i < points.length; i++) {
      var p = points[i];
      for (var d = 0; d < plots.length; d++) {
        if (plots[d].id === p.plot_id) { g[d].push(p); break; }
      }
    }
    for (var d = 0; d < g.length; d++) g[d].sort(function(a,b){ return a.x - b.x; });
    return g;
  }

  function draw() {
    var dpr = window.devicePixelRatio || 1;
    var rect = canvas.getBoundingClientRect();
    W = rect.width * dpr; H = rect.height * dpr;
    canvas.width = W; canvas.height = H;
    ctx.scale(dpr, dpr);
    W = rect.width; H = rect.height;

    // Grid
    ctx.strokeStyle = 'rgba(70,120,180,0.15)'; ctx.lineWidth = 0.5;
    for (var i = 0; i <= 20; i++) {
      var x = PAD + (i / 20) * (W - 2 * PAD);
      ctx.beginPath(); ctx.moveTo(x, PAD); ctx.lineTo(x, H - PAD); ctx.stroke();
    }
    for (var i = 0; i <= 20; i++) {
      var y = PAD + (i / 20) * (H - 2 * PAD);
      if (i === 10) { ctx.strokeStyle = 'rgba(70,120,180,0.35)'; ctx.lineWidth = 1; }
      ctx.beginPath(); ctx.moveTo(PAD, y); ctx.lineTo(W - PAD, y); ctx.stroke();
      if (i === 10) { ctx.strokeStyle = 'rgba(70,120,180,0.15)'; ctx.lineWidth = 0.5; }
    }

    var g = grouped();
    // Draw lines
    for (var d = 0; d < g.length; d++) {
      var pts = g[d]; if (pts.length < 2) continue;
      var isSelPlot = (selDi === d && selPi < 0);
      ctx.strokeStyle = COLORS[d % COLORS.length];
      ctx.lineWidth = isSelPlot ? 4 : 2;
      ctx.beginPath();
      ctx.moveTo(toX(pts[0].x), toY(pts[0].y));
      for (var i = 1; i < pts.length; i++) ctx.lineTo(toX(pts[i].x), toY(pts[i].y));
      ctx.stroke();
    }
    // Draw points
    for (var d = 0; d < g.length; d++) {
      var pts = g[d];
      for (var i = 0; i < pts.length; i++) {
        var isSel = (selDi === d && selPi === i);
        var r = isSel ? 8 : 4;
        ctx.fillStyle = COLORS[d % COLORS.length];
        ctx.beginPath();
        ctx.arc(toX(pts[i].x), toY(pts[i].y), r, 0, Math.PI * 2);
        ctx.fill();
      }
    }
  }

  // Hit test: find point within radius
  function hitTest(cx, cy) {
    var g = grouped();
    var best = null, bestD = 20; // CSS pixel threshold
    for (var d = 0; d < g.length; d++) {
      for (var i = 0; i < g[d].length; i++) {
        var dx = toX(g[d][i].x) - cx, dy = toY(g[d][i].y) - cy;
        var dist = Math.sqrt(dx*dx + dy*dy);
        if (dist < bestD) { bestD = dist; best = { di: d, pi: i }; }
      }
    }
    return best;
  }

  function getPos(e) {
    var t = e.touches ? e.touches[0] : e;
    var r = canvas.getBoundingClientRect();
    return { x: t.clientX - r.left, y: t.clientY - r.top };
  }

  function onStart(e) {
    if (isDragging) return;
    var pos = getPos(e);
    var hit = hitTest(pos.x, pos.y);
    if (!hit) return;
    e.preventDefault();
    isDragging = true; didMove = false;
    var g = grouped();
    dragPt = g[hit.di][hit.pi]; // direct reference to the point object
    selDi = hit.di; selPi = hit.pi;
    draw(); updateLabel();
  }

  function onMove(e) {
    if (!isDragging || !dragPt) return;
    e.preventDefault(); didMove = true;
    var pos = getPos(e);
    dragPt.x = fromX(pos.x); dragPt.y = fromY(pos.y);
    draw(); updateLabel();
  }

  function onEnd() {
    if (!isDragging) return;
    isDragging = false;
    if (didMove) {
      selDi = -1; selPi = -1;
      draw(); updateLabel();
      savePoints();
    }
    dragPt = null;
  }

  function onClick(e) {
    if (didMove) { didMove = false; return; }
    var pos = getPos(e);
    var hit = hitTest(pos.x, pos.y);
    if (hit) return; // handled by onStart
    selDi = -1; selPi = -1;
    draw(); updateLabel();
  }

  function updateLabel() {
    var el = document.getElementById('label');
    if (selDi < 0) { el.textContent = ''; return; }
    var color = COLORS[selDi % COLORS.length];
    var name = plots[selDi].title || 'Plot';
    el.style.color = color;
    if (selPi >= 0) {
      var g = grouped();
      var pt = g[selDi][selPi];
      el.textContent = name + '  (' + pt.x + ', ' + pt.y + ')';
    } else {
      el.textContent = name;
    }
  }

  function savePoints() {
    var out = [];
    for (var i = 0; i < points.length; i++) {
      out.push({ plot_id: points[i].plot_id, x_pos: points[i].x, y_val: points[i].y });
    }
    api('POST', 'stories/' + storyId + '/chartpoints', { points: out });
  }

  // --- Init ---
  (async function() {
    var user = await getUser();
    renderHeader(user);
    var id = new URLSearchParams(location.search).get('id');
    if (!id) { location.href = '/'; return; }

    var data;
    try { data = await api('GET', 'stories/' + id); }
    catch (e) { document.getElementById('content').innerHTML = '<p class="empty">' + e.message + '</p>'; return; }

    storyId = data.story.id;
    plots = data.plots;
    points = (data.chartPoints || []).map(function(cp) { return { plot_id: cp.plot_id, x: cp.x_pos, y: cp.y_val }; });

    document.getElementById('content').innerHTML =
      '<h1>' + (data.story.title || 'Untitled') + '</h1>' +
      '<div style="width:100%;aspect-ratio:1;border:1.5px solid #8ab;border-radius:6px;overflow:hidden;background:#eef4fb">' +
        '<canvas id="c" style="width:100%;height:100%;display:block;touch-action:none"></canvas>' +
      '</div>' +
      '<div id="label" style="text-align:center;font-size:0.85em;color:#888;margin-top:8px;min-height:1.4em"></div>';

    canvas = document.getElementById('c');
    ctx = canvas.getContext('2d');
    draw();
    window.addEventListener('resize', draw);

    canvas.addEventListener('mousedown', onStart);
    canvas.addEventListener('touchstart', onStart, { passive: false });
    window.addEventListener('mousemove', onMove);
    window.addEventListener('touchmove', onMove, { passive: false });
    window.addEventListener('mouseup', onEnd);
    window.addEventListener('touchend', onEnd);
    canvas.addEventListener('click', onClick);
  })();
  </script>
</body>
</html>
