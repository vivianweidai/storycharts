<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Story Charts</title>
  <link rel="stylesheet" href="/app.css">
  <link rel="icon" href="/favicon/favicon.ico">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
</head>
<body>
  <div class="header" id="header"></div>
  <div id="content"><p class="empty">Loading...</p></div>

  <script src="/app.js"></script>
  <script>
    const COLORS = ['#4a7fd4','#e06040','#50a040','#d4a020','#9060c0'];
    var storyId, plots;

    (async function() {
      var user = await getUser();
      renderHeader(user);

      var id = new URLSearchParams(location.search).get('id');
      if (!id) { location.href = '/'; return; }

      var data;
      try { data = await api('GET', 'stories/' + id); }
      catch (e) { document.getElementById('content').innerHTML = '<p class="empty">' + e.message + '</p>'; return; }

      storyId = data.story.id;
      plots = data.plots;
      var cp = data.chartPoints || [];

      document.getElementById('content').innerHTML =
        '<h1>' + (data.story.title || 'Untitled') + '</h1>' +
        '<div id="chart-wrap" style="position:relative;width:100%;aspect-ratio:1;border:1.5px solid #8ab;border-radius:6px;overflow:hidden;background:#eef4fb">' +
          '<canvas id="myChart" style="width:100%;height:100%;display:block;touch-action:none"></canvas>' +
          '<div id="halo" style="display:none;position:absolute;width:80px;height:80px;border-radius:50%;pointer-events:none;transform:translate(-50%,-50%)"></div>' +
        '</div>' +
        '<div id="sel-label" style="text-align:center;font-size:0.85em;color:#888;margin-top:8px;min-height:1.4em"></div>';

      // Build datasets — 0-10000 stored, display as 0-100%
      var byPlot = {};
      for (var i = 0; i < cp.length; i++) {
        var p = cp[i];
        if (!byPlot[p.plot_id]) byPlot[p.plot_id] = [];
        byPlot[p.plot_id].push({ x: p.x_pos / 100, y: p.y_val / 100 });
      }

      var datasets = [];
      for (var pi = 0; pi < plots.length; pi++) {
        var pts = byPlot[plots[pi].id] || [];
        pts.sort(function(a, b) { return a.x - b.x; });
        datasets.push({
          label: plots[pi].title || 'Plot',
          data: pts,
          borderColor: COLORS[pi % COLORS.length],
          backgroundColor: COLORS[pi % COLORS.length],
          showLine: true,
          tension: 0,
          pointRadius: 5,
          pointHitRadius: 20,
          pointStyle: 'circle',
          borderWidth: 2,
          fill: false
        });
      }

      var canvas = document.getElementById('myChart');
      var chart = new Chart(canvas, {
        type: 'scatter',
        data: { datasets: datasets },
        options: {
          responsive: true,
          maintainAspectRatio: true,
          aspectRatio: 1,
          layout: { padding: 16 },
          clip: false,
          animation: false,
          plugins: {
            legend: { display: false },
            tooltip: { enabled: false }
          },
          scales: {
            x: {
              type: 'linear', min: 0, max: 100,
              ticks: { display: false, stepSize: 5 },
              grid: { color: 'rgba(70,120,180,0.15)', lineWidth: 0.5, drawTicks: false },
              border: { display: false }
            },
            y: {
              type: 'linear', min: 0, max: 100,
              ticks: { display: false, stepSize: 5 },
              grid: {
                color: function(ctx) { return ctx.tick.value === 50 ? 'rgba(70,120,180,0.4)' : 'rgba(70,120,180,0.15)'; },
                lineWidth: function(ctx) { return ctx.tick.value === 50 ? 1.5 : 0.5; },
                drawTicks: false
              },
              border: { display: false }
            }
          }
        }
      });

      // --- Selection + highlight state ---
      var selectedDsi = -1, selectedIdx = -1; // persists after release

      function updateLabel() {
        var label = document.getElementById('sel-label');
        if (selectedDsi < 0) {
          label.textContent = '';
          label.style.color = '#888';
          return;
        }
        var color = COLORS[selectedDsi % COLORS.length];
        var plotName = plots[selectedDsi].title || 'Plot ' + (selectedDsi + 1);
        label.style.color = color;
        if (selectedIdx >= 0) {
          var pt = chart.data.datasets[selectedDsi].data[selectedIdx];
          if (pt) {
            label.textContent = plotName + '  (' + (pt.x * 100).toFixed(0) + ', ' + (pt.y * 100).toFixed(0) + ')';
          } else {
            label.textContent = plotName;
          }
        } else {
          label.textContent = plotName;
        }
      }

      function applySelection() {
        // Reset all datasets to default styling
        for (var d = 0; d < plots.length; d++) {
          var ds = chart.data.datasets[d];
          var len = ds.data.length;
          if (selectedDsi === d) {
            // Selected plot: bold line, larger points
            ds.borderWidth = 3;
            ds.pointRadius = new Array(len).fill(6);
            ds.borderColor = COLORS[d % COLORS.length];
            ds.backgroundColor = COLORS[d % COLORS.length];
          } else if (selectedDsi >= 0) {
            // Unselected plot: fade it
            ds.borderWidth = 1.5;
            ds.pointRadius = new Array(len).fill(4);
            ds.borderColor = COLORS[d % COLORS.length] + '50';
            ds.backgroundColor = COLORS[d % COLORS.length] + '50';
          } else {
            // Nothing selected: normal
            ds.borderWidth = 2;
            ds.pointRadius = new Array(len).fill(5);
            ds.borderColor = COLORS[d % COLORS.length];
            ds.backgroundColor = COLORS[d % COLORS.length];
          }
        }
        // If a specific point is selected, make it extra big
        if (selectedDsi >= 0 && selectedIdx >= 0) {
          var sds = chart.data.datasets[selectedDsi];
          if (selectedIdx < sds.pointRadius.length) {
            sds.pointRadius[selectedIdx] = 10;
          }
        }
        chart.update('none');
        updateLabel();
      }

      // --- Halo overlay ---
      var haloEl = document.getElementById('halo');
      var wrapEl = document.getElementById('chart-wrap');

      function drawHaloAtPos(pos, di) {
        if (!pos || di < 0) { haloEl.style.display = 'none'; return; }
        var wrapRect = wrapEl.getBoundingClientRect();
        // Use client coords relative to wrapper
        var left = pos.cx - wrapRect.left;
        var top = pos.cy - wrapRect.top;
        var color = COLORS[di % COLORS.length];
        haloEl.style.display = 'block';
        haloEl.style.left = left + 'px';
        haloEl.style.top = top + 'px';
        haloEl.style.background = color + '18';
        haloEl.style.border = '2.5px solid ' + color + '40';
      }

      function showHaloOnSelected() {
        // After release, just hide halo — the enlarged point is enough
        haloEl.style.display = 'none';
      }

      // --- Custom drag + tap implementation ---
      var dragDsi = -1, dragIdx = -1, isDragging = false, didMove = false;

      function getPos(e) {
        var t = e.touches ? e.touches[0] : e;
        var rect = canvas.getBoundingClientRect();
        // Return position relative to canvas CSS box
        return { cx: t.clientX, cy: t.clientY, x: t.clientX - rect.left, y: t.clientY - rect.top };
      }

      // Use native event for Chart.js hit detection (handles all DPR/coord math)
      function findPointNative(e) {
        var elements = chart.getElementsAtEventForMode(e, 'nearest', { intersect: false }, false);
        for (var i = 0; i < elements.length; i++) {
          if (elements[i].datasetIndex < plots.length) {
            return { di: elements[i].datasetIndex, pi: elements[i].index };
          }
        }
        return null;
      }

      function findLineNative(e) {
        var elements = chart.getElementsAtEventForMode(e, 'nearest', { intersect: false, axis: 'xy' }, false);
        for (var i = 0; i < elements.length; i++) {
          if (elements[i].datasetIndex < plots.length) {
            return { di: elements[i].datasetIndex };
          }
        }
        return null;
      }

      function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

      function pixelToValue(cssX, cssY) {
        // Convert CSS-relative coords to chart internal pixel coords
        var dpr = window.devicePixelRatio || 1;
        var ix = cssX * dpr;
        var iy = cssY * dpr;
        var xScale = chart.scales.x, yScale = chart.scales.y;
        return {
          x: clamp(xScale.getValueForPixel(ix), 0, 100),
          y: clamp(yScale.getValueForPixel(iy), 0, 100)
        };
      }

      function onStart(e) {
        var hit = findPointNative(e);
        if (!hit) return;
        e.preventDefault();
        isDragging = true;
        didMove = false;
        dragDsi = hit.di;
        dragIdx = hit.pi;
        selectedDsi = hit.di;
        selectedIdx = hit.pi;
        applySelection();
        var pos = getPos(e);
        drawHaloAtPos(pos, dragDsi);
      }

      function onMove(e) {
        if (!isDragging) return;
        e.preventDefault();
        didMove = true;
        var pos = getPos(e);
        var val = pixelToValue(pos.x, pos.y);
        chart.data.datasets[dragDsi].data[dragIdx].x = val.x;
        chart.data.datasets[dragDsi].data[dragIdx].y = val.y;
        applySelection();
        drawHaloAtPos(pos, dragDsi);
      }

      function onEnd(e) {
        if (!isDragging) return;
        isDragging = false;
        if (didMove) {
          chart.data.datasets[dragDsi].data.sort(function(a, b) { return a.x - b.x; });
          selectedIdx = -1;
        }
        applySelection();
        showHaloOnSelected();
        dragDsi = -1;
        dragIdx = -1;
        if (didMove) saveChart(chart);
      }

      // Tap on empty area or line
      canvas.addEventListener('click', function(e) {
        if (didMove) { didMove = false; return; }
        var hit = findPointNative(e);
        if (hit) return; // already handled by onStart
        var lineHit = findLineNative(e);
        if (lineHit) {
          selectedDsi = lineHit.di;
          selectedIdx = -1;
          applySelection();
          haloEl.style.display = 'none';
          return;
        }
        selectedDsi = -1;
        selectedIdx = -1;
        applySelection();
        haloEl.style.display = 'none';
      });

      canvas.addEventListener('mousedown', onStart);
      canvas.addEventListener('touchstart', onStart, { passive: false });
      window.addEventListener('mousemove', onMove);
      window.addEventListener('touchmove', onMove, { passive: false });
      window.addEventListener('mouseup', onEnd);
      window.addEventListener('touchend', onEnd);
    })();

    async function saveChart(chart) {
      var points = [];
      for (var di = 0; di < plots.length; di++) {
        var data = chart.data.datasets[di].data;
        for (var j = 0; j < data.length; j++) {
          points.push({
            plot_id: plots[di].id,
            x_pos: Math.round(data[j].x * 100),
            y_val: Math.round(data[j].y * 100)
          });
        }
      }
      await api('POST', 'stories/' + storyId + '/chartpoints', { points: points });
    }
  </script>
</body>
</html>
