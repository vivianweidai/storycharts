<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Story Charts</title>
  <link rel="stylesheet" href="/app.css">
  <link rel="icon" href="/favicon/favicon.ico">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
</head>
<body>
  <div class="header" id="header"></div>
  <div id="content"><p class="empty">Loading...</p></div>

  <script src="/app.js"></script>
  <script>
    const COLORS = ['#f4a6a0','#a1c9f4','#b0d9a0','#f9c784','#d4a8e8'];

    (async function() {
      const user = await getUser();
      renderHeader(user);

      const id = new URLSearchParams(location.search).get('id');
      if (!id) { location.href = '/'; return; }

      let data;
      try { data = await api('GET', 'stories/' + id); }
      catch (e) { document.getElementById('content').innerHTML = '<p class="empty">' + e.message + '</p>'; return; }

      const { story, plots, chartPoints, isOwner } = data;
      const cp = chartPoints || [];

      document.getElementById('content').innerHTML =
        '<h1>' + (story.title || 'Untitled') + '</h1>' +
        '<div style="position:relative;height:400px;margin:16px 0"><canvas id="myChart"></canvas></div>' +
        '<p style="text-align:center;color:#656d76;font-size:0.85em">Style 1: Clean Minimal</p>';

      // Build datasets
      var byPlot = {};
      cp.forEach(function(p) {
        if (!byPlot[p.plot_id]) byPlot[p.plot_id] = [];
        byPlot[p.plot_id].push({x: p.x_pos, y: p.y_val});
      });
      var datasets = plots.map(function(plot, i) {
        var pts = byPlot[plot.id] || [];
        pts.sort(function(a,b) { return a.x - b.x; });
        return {
          label: plot.title,
          data: pts,
          borderColor: COLORS[i % COLORS.length],
          backgroundColor: COLORS[i % COLORS.length],
          showLine: true, tension: 0,
          pointRadius: 6, fill: false
        };
      });

      new Chart(document.getElementById('myChart'), {
        type: 'scatter',
        data: { datasets: datasets },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: { legend: { display: false } },
          scales: {
            x: { type: 'linear', min: -1, max: 21, ticks: { display: false, stepSize: 1 }, grid: { color: '#e8e8e8', lineWidth: 0.5 }, border: { display: true, color: '#e8e8e8' } },
            y: { type: 'linear', min: -11, max: 11, ticks: { display: false, stepSize: 1 }, grid: { color: '#e8e8e8', lineWidth: 0.5 }, border: { display: true, color: '#e8e8e8' } }
          }
        }
      });
    })();
  </script>
</body>
</html>
