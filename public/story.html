<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Story Charts</title>
  <link rel="stylesheet" href="/app.css">
  <link rel="icon" href="/favicon/favicon.ico">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
</head>
<body>
  <div class="header" id="header"></div>
  <div id="content"><p class="empty">Loading...</p></div>

  <script src="/app.js"></script>
  <script>
    const COLORS = ['#4a7fd4','#e06040','#50a040','#d4a020','#9060c0'];
    var storyId, plots;

    (async function() {
      var user = await getUser();
      renderHeader(user);

      var id = new URLSearchParams(location.search).get('id');
      if (!id) { location.href = '/'; return; }

      var data;
      try { data = await api('GET', 'stories/' + id); }
      catch (e) { document.getElementById('content').innerHTML = '<p class="empty">' + e.message + '</p>'; return; }

      storyId = data.story.id;
      plots = data.plots;
      var cp = data.chartPoints || [];

      document.getElementById('content').innerHTML =
        '<h1>' + (data.story.title || 'Untitled') + '</h1>' +
        '<div id="chart-wrap" style="position:relative;width:100%;height:0;padding-bottom:100%;border:1.5px solid #8ab;border-radius:6px;overflow:hidden;background:#eef4fb">' +
          '<canvas id="myChart" style="position:absolute;top:0;left:0;width:100%;height:100%;touch-action:none"></canvas>' +
          '<div id="halo" style="display:none;position:absolute;width:80px;height:80px;border-radius:50%;pointer-events:none;transform:translate(-50%,-50%)"></div>' +
        '</div>';

      // Build datasets — 0-10000 stored, display as 0-100%
      var byPlot = {};
      for (var i = 0; i < cp.length; i++) {
        var p = cp[i];
        if (!byPlot[p.plot_id]) byPlot[p.plot_id] = [];
        byPlot[p.plot_id].push({ x: p.x_pos / 100, y: p.y_val / 100 });
      }

      var datasets = [];
      for (var pi = 0; pi < plots.length; pi++) {
        var pts = byPlot[plots[pi].id] || [];
        pts.sort(function(a, b) { return a.x - b.x; });
        datasets.push({
          label: plots[pi].title || 'Plot',
          data: pts,
          borderColor: COLORS[pi % COLORS.length],
          backgroundColor: COLORS[pi % COLORS.length],
          showLine: true,
          tension: 0,
          pointRadius: 5,
          pointHitRadius: 20,
          pointStyle: 'circle',
          borderWidth: 2,
          fill: false
        });
      }

      var canvas = document.getElementById('myChart');
      var chart = new Chart(canvas, {
        type: 'scatter',
        data: { datasets: datasets },
        options: {
          responsive: true,
          maintainAspectRatio: true,
          aspectRatio: 1,
          layout: { padding: 16 },
          clip: false,
          animation: false,
          plugins: {
            legend: { display: false },
            tooltip: { enabled: false }
          },
          scales: {
            x: {
              type: 'linear', min: 0, max: 100,
              ticks: { display: false, stepSize: 5 },
              grid: { color: 'rgba(70,120,180,0.15)', lineWidth: 0.5, drawTicks: false },
              border: { display: false }
            },
            y: {
              type: 'linear', min: 0, max: 100,
              ticks: { display: false, stepSize: 5 },
              grid: {
                color: function(ctx) { return ctx.tick.value === 50 ? 'rgba(70,120,180,0.4)' : 'rgba(70,120,180,0.15)'; },
                lineWidth: function(ctx) { return ctx.tick.value === 50 ? 1.5 : 0.5; },
                drawTicks: false
              },
              border: { display: false }
            }
          }
        }
      });

      // --- Selection + highlight state ---
      var selectedDsi = -1, selectedIdx = -1; // persists after release

      function applySelection() {
        // Reset all datasets to default styling
        for (var d = 0; d < plots.length; d++) {
          var ds = chart.data.datasets[d];
          var len = ds.data.length;
          if (selectedDsi === d) {
            // Selected plot: bold line, larger points
            ds.borderWidth = 3;
            ds.pointRadius = new Array(len).fill(6);
            ds.borderColor = COLORS[d % COLORS.length];
            ds.backgroundColor = COLORS[d % COLORS.length];
          } else if (selectedDsi >= 0) {
            // Unselected plot: fade it
            ds.borderWidth = 1.5;
            ds.pointRadius = new Array(len).fill(4);
            ds.borderColor = COLORS[d % COLORS.length] + '50';
            ds.backgroundColor = COLORS[d % COLORS.length] + '50';
          } else {
            // Nothing selected: normal
            ds.borderWidth = 2;
            ds.pointRadius = new Array(len).fill(5);
            ds.borderColor = COLORS[d % COLORS.length];
            ds.backgroundColor = COLORS[d % COLORS.length];
          }
        }
        // If a specific point is selected, make it extra big
        if (selectedDsi >= 0 && selectedIdx >= 0) {
          var sds = chart.data.datasets[selectedDsi];
          if (selectedIdx < sds.pointRadius.length) {
            sds.pointRadius[selectedIdx] = 10;
          }
        }
        chart.update('none');
      }

      // --- Halo overlay ---
      var haloEl = document.getElementById('halo');
      var wrapEl = document.getElementById('chart-wrap');

      function drawHaloAtPos(pos, di) {
        if (!pos || di < 0) { haloEl.style.display = 'none'; return; }
        var wrapRect = wrapEl.getBoundingClientRect();
        var canvasRect = canvas.getBoundingClientRect();
        var left = canvasRect.left - wrapRect.left + pos.x;
        var top = canvasRect.top - wrapRect.top + pos.y;
        var color = COLORS[di % COLORS.length];
        haloEl.style.display = 'block';
        haloEl.style.left = left + 'px';
        haloEl.style.top = top + 'px';
        haloEl.style.background = color + '18';
        haloEl.style.border = '2.5px solid ' + color + '40';
      }

      function showHaloOnSelected() {
        if (selectedDsi < 0 || selectedIdx < 0) { haloEl.style.display = 'none'; return; }
        var meta = chart.getDatasetMeta(selectedDsi);
        if (!meta.data[selectedIdx]) { haloEl.style.display = 'none'; return; }
        var el = meta.data[selectedIdx];
        var canvasRect = canvas.getBoundingClientRect();
        var wrapRect = wrapEl.getBoundingClientRect();
        var scaleX = canvasRect.width / canvas.width;
        var scaleY = canvasRect.height / canvas.height;
        var left = canvasRect.left - wrapRect.left + el.x * scaleX;
        var top = canvasRect.top - wrapRect.top + el.y * scaleY;
        var color = COLORS[selectedDsi % COLORS.length];
        haloEl.style.display = 'block';
        haloEl.style.left = left + 'px';
        haloEl.style.top = top + 'px';
        haloEl.style.background = color + '18';
        haloEl.style.border = '2.5px solid ' + color + '40';
      }

      // --- Custom drag + tap implementation ---
      var dragDsi = -1, dragIdx = -1, isDragging = false, didMove = false;

      function getPos(e) {
        var t = e.touches ? e.touches[0] : e;
        var rect = canvas.getBoundingClientRect();
        return { x: t.clientX - rect.left, y: t.clientY - rect.top };
      }

      function findPoint(pos) {
        var best = null, bestDist = 25;
        for (var di = 0; di < plots.length; di++) {
          var meta = chart.getDatasetMeta(di);
          for (var pi = 0; pi < meta.data.length; pi++) {
            var el = meta.data[pi];
            // Scale chart coords to CSS coords for distance check
            var canvasRect = canvas.getBoundingClientRect();
            var ex = el.x * canvasRect.width / canvas.width;
            var ey = el.y * canvasRect.height / canvas.height;
            var dx = ex - pos.x, dy = ey - pos.y;
            var dist = Math.sqrt(dx * dx + dy * dy);
            if (dist < bestDist) {
              bestDist = dist;
              best = { di: di, pi: pi };
            }
          }
        }
        return best;
      }

      function findLine(pos) {
        // Check if pos is near any line segment
        var canvasRect = canvas.getBoundingClientRect();
        for (var di = 0; di < plots.length; di++) {
          var meta = chart.getDatasetMeta(di);
          for (var pi = 0; pi < meta.data.length - 1; pi++) {
            var a = meta.data[pi], b = meta.data[pi + 1];
            var ax = a.x * canvasRect.width / canvas.width;
            var ay = a.y * canvasRect.height / canvas.height;
            var bx = b.x * canvasRect.width / canvas.width;
            var by = b.y * canvasRect.height / canvas.height;
            var dist = distToSegment(pos.x, pos.y, ax, ay, bx, by);
            if (dist < 15) return { di: di };
          }
        }
        return null;
      }

      function distToSegment(px, py, ax, ay, bx, by) {
        var dx = bx - ax, dy = by - ay;
        var t = ((px - ax) * dx + (py - ay) * dy) / (dx * dx + dy * dy);
        t = Math.max(0, Math.min(1, t));
        var nx = ax + t * dx, ny = ay + t * dy;
        return Math.sqrt((px - nx) * (px - nx) + (py - ny) * (py - ny));
      }

      function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

      function pixelToValue(pos) {
        var xScale = chart.scales.x, yScale = chart.scales.y;
        return {
          x: clamp(xScale.getValueForPixel(pos.x), 0, 100),
          y: clamp(yScale.getValueForPixel(pos.y), 0, 100)
        };
      }

      function onStart(e) {
        var pos = getPos(e);
        var hit = findPoint(pos);
        if (!hit) return;
        e.preventDefault();
        isDragging = true;
        didMove = false;
        dragDsi = hit.di;
        dragIdx = hit.pi;
        selectedDsi = hit.di;
        selectedIdx = hit.pi;
        applySelection();
        drawHaloAtPos(pos, dragDsi);
      }

      function onMove(e) {
        if (!isDragging) return;
        e.preventDefault();
        didMove = true;
        var pos = getPos(e);
        var val = pixelToValue(pos);
        chart.data.datasets[dragDsi].data[dragIdx].x = val.x;
        chart.data.datasets[dragDsi].data[dragIdx].y = val.y;
        applySelection();
        drawHaloAtPos(pos, dragDsi);
      }

      function onEnd(e) {
        if (!isDragging) return;
        isDragging = false;
        if (didMove) {
          chart.data.datasets[dragDsi].data.sort(function(a, b) { return a.x - b.x; });
          // Find the new index of the dragged point after sort
          selectedIdx = -1; // we'll just keep plot selected
        }
        applySelection();
        showHaloOnSelected();
        dragDsi = -1;
        dragIdx = -1;
        if (didMove) saveChart(chart);
      }

      // Tap on empty area or line
      canvas.addEventListener('click', function(e) {
        if (didMove) return; // was a drag, not a tap
        var pos = getPos(e);
        var hit = findPoint(pos);
        if (hit) {
          // Point tap — already handled by onStart
          return;
        }
        var lineHit = findLine(pos);
        if (lineHit) {
          // Line tap — select entire plot
          selectedDsi = lineHit.di;
          selectedIdx = -1;
          applySelection();
          haloEl.style.display = 'none';
          return;
        }
        // Tap on empty — deselect all
        selectedDsi = -1;
        selectedIdx = -1;
        applySelection();
        haloEl.style.display = 'none';
      });

      canvas.addEventListener('mousedown', onStart);
      canvas.addEventListener('touchstart', onStart, { passive: false });
      window.addEventListener('mousemove', onMove);
      window.addEventListener('touchmove', onMove, { passive: false });
      window.addEventListener('mouseup', onEnd);
      window.addEventListener('touchend', onEnd);
    })();

    async function saveChart(chart) {
      var points = [];
      for (var di = 0; di < plots.length; di++) {
        var data = chart.data.datasets[di].data;
        for (var j = 0; j < data.length; j++) {
          points.push({
            plot_id: plots[di].id,
            x_pos: Math.round(data[j].x * 100),
            y_val: Math.round(data[j].y * 100)
          });
        }
      }
      await api('POST', 'stories/' + storyId + '/chartpoints', { points: points });
    }
  </script>
</body>
</html>
