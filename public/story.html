<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Story Charts</title>
  <link rel="stylesheet" href="/app.css">
  <link rel="icon" href="/favicon/favicon.ico">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-dragdata@latest/dist/chartjs-plugin-dragdata.min.js"></script>
</head>
<body>
  <div class="header" id="header"></div>
  <div id="content"><p class="empty">Loading...</p></div>

  <script src="/app.js"></script>
  <script>
    let storyData = null;
    let chartInstance = null;

    (async function() {
      const user = await getUser();
      renderHeader(user);

      const id = new URLSearchParams(location.search).get('id');
      if (!id) { location.href = '/'; return; }

      try {
        storyData = await api('GET', 'stories/' + id);
      } catch (e) {
        document.getElementById('content').innerHTML = '<p class="empty">' + e.message + '</p>';
        return;
      }

      render(storyData, user);
    })();

    function render(data, user) {
      const { story, plots, scenes, turningPoints, isOwner } = data;
      const content = document.getElementById('content');
      let html = '';

      // Title row with edit/delete
      html += '<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">';
      html += '<h1 style="margin:0">' + (story.title || 'Untitled') + '</h1>';
      if (story.private) html += '<span class="badge badge-private">private</span>';
      if (isOwner) {
        html += '<button class="btn btn-sm" onclick="editStory()">edit</button>';
        html += '<button class="btn btn-sm btn-danger" onclick="deleteStory()">delete</button>';
      }
      html += '</div>';

      // Chart area — always present
      html += '<div class="chart-container" id="chart-area" style="height:400px;margin:16px 0">';
      if (!plots.length && !scenes.length) {
        html += '<p class="empty">Add plots and scenes to build your chart.</p>';
      }
      html += '</div>';

      // Summary below chart
      if (story.summary) {
        html += '<p style="font-size:0.9em;color:#444;margin:8px 0">' + story.summary + '</p>';
      }

      // Action buttons below chart
      if (isOwner) {
        html += '<div class="actions">';
        html += '<button class="btn btn-primary" onclick="addPlot()">Add Plot</button>';
        html += '<button class="btn btn-primary" onclick="addScene()">Add Scene</button>';
        if (plots.length && scenes.length) {
          html += '<button class="btn" onclick="saveChart()">Save Chart</button>';
        }
        if (turningPoints.length) {
          html += '<button class="btn btn-danger" onclick="clearChart()">Clear Chart</button>';
        }
        if (plots.length > 1 || scenes.length > 1) {
          html += '<button class="btn" onclick="showOrder()">Reorder</button>';
        }
        html += '</div>';
      }

      // TP legend
      if (plots.length && scenes.length) {
        html += '<div class="tp-legend">';
        html += '<div class="tp-legend-title">Turning Point Types (drag points to change)</div>';
        html += '<div class="tp-legend-items">';
        html += '<span class="tp-tag tp-up">Success +3</span>';
        html += '<span class="tp-tag tp-up">Accelerate +2</span>';
        html += '<span class="tp-tag tp-up">Increase +1</span>';
        html += '<span class="tp-tag tp-none">None 0</span>';
        html += '<span class="tp-tag tp-down">Decrease -1</span>';
        html += '<span class="tp-tag tp-down">Decelerate -2</span>';
        html += '<span class="tp-tag tp-down">Failure -3</span>';
        html += '</div></div>';
      }

      // Plots list
      if (plots.length) {
        html += '<h2>Plots</h2>';
        for (const p of plots) {
          html += '<details><summary>' + (p.title || 'Untitled Plot');
          if (isOwner) html += ' <button class="btn btn-sm" onclick="event.stopPropagation();editPlot(' + p.id + ')">edit</button>';
          html += '</summary><div class="detail-body">' + (p.description || '<em>No description</em>') + '</div></details>';
        }
      }

      // Scenes list
      if (scenes.length) {
        html += '<h2>Scenes</h2>';
        for (const s of scenes) {
          html += '<details><summary>' + (s.title || 'Untitled Scene');
          if (isOwner) html += ' <button class="btn btn-sm" onclick="event.stopPropagation();editScene(' + s.id + ')">edit</button>';
          html += '</summary><div class="detail-body">' + (s.description || '<em>No description</em>') + '</div></details>';
        }
      }

      content.innerHTML = html;

      // Render the draggable chart if we have plots and scenes
      if (plots.length && scenes.length) {
        chartInstance = renderDraggableChart(
          document.getElementById('chart-area'),
          plots, scenes, turningPoints
        );
      }
    }

    // --- Chart save/clear ---

    async function saveChart() {
      if (!chartInstance || !chartInstance._tpMap) return;
      const tpMap = chartInstance._tpMap;
      const tps = [];
      for (const plot of storyData.plots) {
        for (const scene of storyData.scenes) {
          const key = plot.id + '-' + scene.id;
          tps.push({
            plot_id: plot.id,
            scene_id: scene.id,
            tp_type: tpMap[key] || 'None'
          });
        }
      }
      await api('POST', 'stories/' + storyData.story.id + '/turningpoints', { turningPoints: tps });
      location.reload();
    }

    async function clearChart() {
      if (!confirm('Delete all chart data for this story?')) return;
      await api('DELETE', 'stories/' + storyData.story.id + '/turningpoints');
      location.reload();
    }

    // --- Story CRUD ---

    function editStory() {
      const s = storyData.story;
      showModal('Edit Story', [
        { name: 'title', label: 'Title', type: 'text', value: s.title },
        { name: 'summary', label: 'Summary', type: 'textarea', value: s.summary },
        { name: 'private', label: 'Visibility', type: 'checkbox', checkLabel: 'Private', value: s.private }
      ], async (data) => {
        await api('PUT', 'stories/' + s.id, data);
        location.reload();
      });
    }

    async function deleteStory() {
      if (!confirm('Delete this story and all its plots, scenes, and chart data?')) return;
      await api('DELETE', 'stories/' + storyData.story.id);
      location.href = '/';
    }

    // --- Plot CRUD ---

    function addPlot() {
      showModal('New Plot', [
        { name: 'title', label: 'Title', type: 'text' },
        { name: 'description', label: 'Description', type: 'textarea' }
      ], async (data) => {
        await api('POST', 'stories/' + storyData.story.id + '/plots', data);
        location.reload();
      });
    }

    function editPlot(plotId) {
      const p = storyData.plots.find(x => x.id === plotId);
      showModal('Edit Plot', [
        { name: 'title', label: 'Title', type: 'text', value: p.title },
        { name: 'description', label: 'Description', type: 'textarea', value: p.description }
      ], async (data) => {
        await api('PUT', 'plots/' + plotId, data);
        location.reload();
      }, async () => {
        await api('DELETE', 'plots/' + plotId);
        location.reload();
      });
    }

    // --- Scene CRUD ---

    function addScene() {
      showModal('New Scene', [
        { name: 'title', label: 'Title', type: 'text' },
        { name: 'description', label: 'Description', type: 'textarea' }
      ], async (data) => {
        await api('POST', 'stories/' + storyData.story.id + '/scenes', data);
        location.reload();
      });
    }

    function editScene(sceneId) {
      const s = storyData.scenes.find(x => x.id === sceneId);
      showModal('Edit Scene', [
        { name: 'title', label: 'Title', type: 'text', value: s.title },
        { name: 'description', label: 'Description', type: 'textarea', value: s.description }
      ], async (data) => {
        await api('PUT', 'scenes/' + sceneId, data);
        location.reload();
      }, async () => {
        await api('DELETE', 'scenes/' + sceneId);
        location.reload();
      });
    }

    // --- Reorder ---

    function showOrder() {
      const { story, plots, scenes } = storyData;
      const overlay = document.createElement('div');
      overlay.className = 'modal-overlay';

      let html = '<div class="modal" style="max-width:600px"><h2>Reorder</h2>';

      if (plots.length > 1) {
        html += '<h2 style="margin-top:8px">Plots</h2><ul class="sort-list" id="sort-plots">';
        for (const p of plots) {
          html += '<li class="sort-item" data-id="' + p.id + '">';
          html += '<div class="sort-btns"><button onclick="moveItem(this,-1)">&#9650;</button><button onclick="moveItem(this,1)">&#9660;</button></div>';
          html += '<span class="sort-label">' + (p.title || 'Untitled') + '</span></li>';
        }
        html += '</ul>';
      }

      if (scenes.length > 1) {
        html += '<h2 style="margin-top:8px">Scenes</h2><ul class="sort-list" id="sort-scenes">';
        for (const s of scenes) {
          html += '<li class="sort-item" data-id="' + s.id + '">';
          html += '<div class="sort-btns"><button onclick="moveItem(this,-1)">&#9650;</button><button onclick="moveItem(this,1)">&#9660;</button></div>';
          html += '<span class="sort-label">' + (s.title || 'Untitled') + '</span></li>';
        }
        html += '</ul>';
      }

      html += '<div class="actions"><button class="btn btn-primary" id="save-order">Save Order</button>';
      html += '<button class="btn" id="cancel-order">Cancel</button></div></div>';

      overlay.innerHTML = html;
      document.body.appendChild(overlay);

      document.getElementById('save-order').onclick = async () => {
        const plotIds = [...document.querySelectorAll('#sort-plots .sort-item')].map(el => parseInt(el.dataset.id));
        const sceneIds = [...document.querySelectorAll('#sort-scenes .sort-item')].map(el => parseInt(el.dataset.id));
        await api('POST', 'stories/' + story.id + '/order', { plots: plotIds, scenes: sceneIds });
        document.body.removeChild(overlay);
        location.reload();
      };

      document.getElementById('cancel-order').onclick = () => document.body.removeChild(overlay);
    }

    function moveItem(btn, dir) {
      const item = btn.closest('.sort-item');
      const list = item.parentNode;
      if (dir === -1 && item.previousElementSibling) {
        list.insertBefore(item, item.previousElementSibling);
      } else if (dir === 1 && item.nextElementSibling) {
        list.insertBefore(item.nextElementSibling, item);
      }
    }
  </script>
</body>
</html>
