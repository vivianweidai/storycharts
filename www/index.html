<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Story Charts</title>
  <link rel="stylesheet" href="/app.css">
  <link rel="icon" href="/favicon.ico">
  <style>
    .chart-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 12px;
    }
    .chart-card {
      border: 1.5px solid #d1d9e0;
      border-radius: 8px;
      overflow: hidden;
      cursor: pointer;
      transition: border-color 0.15s, box-shadow 0.15s;
      text-decoration: none;
      color: inherit;
      display: block;
    }
    .chart-card:hover {
      border-color: #0969da;
      box-shadow: 0 2px 12px rgba(9,105,218,0.12);
      text-decoration: none;
    }
    .chart-card canvas {
      width: 100%;
      aspect-ratio: 1.618 / 1;
      display: block;
      background: #eef4fb;
    }
    .chart-card-info {
      padding: 8px 10px;
      border-top: 1px solid #eee;
    }
    .chart-card-title {
      font-weight: 600;
      font-size: 0.85em;
      color: #1f2328;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .divider {
      border: none;
      border-top: 1px solid #d1d9e0;
      margin: 32px 0 32px;
    }
    .create-section {
      text-align: center;
      padding-bottom: 20px;
    }
    .create-label {
      display: inline-block;
      font: 400 1em/1 'Courier New', Consolas, monospace;
      letter-spacing: .1em;
      color: #fff;
      white-space: nowrap;
      text-shadow: 0 0 7px rgba(255,255,255,.4), 0 0 20px rgba(140,180,255,.2);
      background: rgba(0,0,0,.3);
      backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 50px;
      padding: 11px 28px;
      cursor: pointer;
      transition: background 0.3s;
    }
    .create-label:hover {
      background: rgba(0,0,0,.5);
    }
    #create-cursor {
      display: inline-block; width: 3px; height: 1em;
      background: #fff; margin-left: 4px; vertical-align: text-bottom;
      animation: blink .6s step-end infinite;
    }
    @keyframes blink { 50% { opacity: 0; } }
  </style>
</head>
<body style="max-width:800px">
  <div class="header" id="header"></div>
  <div id="content"><p class="empty">Loading...</p></div>

  <script src="/app.js"></script>
  <script>
    var MAX_STORIES = 20;

    function drawMiniChart(canvas, plots) {
      var dpr = window.devicePixelRatio || 1;
      var rect = canvas.getBoundingClientRect();
      if (rect.width === 0) return;
      canvas.width = rect.width * dpr;
      canvas.height = rect.height * dpr;
      var ctx = canvas.getContext('2d');
      ctx.scale(dpr, dpr);
      var W = rect.width, H = rect.height, PAD = 6;

      // Grid
      ctx.strokeStyle = 'rgba(70,120,180,0.1)';
      ctx.lineWidth = 0.5;
      for (var i = 0; i <= 10; i++) {
        var x = PAD + (i / 10) * (W - 2 * PAD);
        ctx.beginPath(); ctx.moveTo(x, PAD); ctx.lineTo(x, H - PAD); ctx.stroke();
      }
      for (var i = 0; i <= 10; i++) {
        var y = PAD + (i / 10) * (H - 2 * PAD);
        ctx.beginPath(); ctx.moveTo(PAD, y); ctx.lineTo(W - PAD, y); ctx.stroke();
      }

      // Lines + points
      for (var d = 0; d < plots.length; d++) {
        var pts = plots[d].points;
        if (!pts || pts.length === 0) continue;
        pts.sort(function(a, b) { return a.x - b.x; });
        var color = (plots[d].color >= 0) ? COLORS[plots[d].color % COLORS.length] : COLORS[d % COLORS.length];

        if (pts.length > 1) {
          ctx.strokeStyle = color;
          ctx.lineWidth = 1.5;
          ctx.beginPath();
          ctx.moveTo(PAD + (pts[0].x / 10000) * (W - 2 * PAD), PAD + (1 - pts[0].y / 10000) * (H - 2 * PAD));
          for (var i = 1; i < pts.length; i++) {
            ctx.lineTo(PAD + (pts[i].x / 10000) * (W - 2 * PAD), PAD + (1 - pts[i].y / 10000) * (H - 2 * PAD));
          }
          ctx.stroke();
        }

        ctx.fillStyle = color;
        for (var i = 0; i < pts.length; i++) {
          ctx.beginPath();
          ctx.arc(PAD + (pts[i].x / 10000) * (W - 2 * PAD), PAD + (1 - pts[i].y / 10000) * (H - 2 * PAD), 2.5, 0, Math.PI * 2);
          ctx.fill();
        }
      }
    }

    (async function() {
      var user = await getUser();
      renderHeader(user);

      var stories = await api('GET', 'stories');
      var content = document.getElementById('content');

      var html = '';

      if (!stories.length && !user) {
        html += '<p class="empty">No story charts yet. <a href="/api/auth/login?redirect=' + encodeURIComponent(location.pathname) + '">Login</a> to create one.</p>';
      } else if (!stories.length) {
        html += '<p class="empty">No story charts yet.</p>';
      } else {
        html += '<div class="chart-grid" id="chart-grid">';
        for (var i = 0; i < stories.length; i++) {
          var s = stories[i];
          html += '<a class="chart-card" href="/story.html?id=' + s.id + '">' +
                    '<canvas id="mini-' + s.id + '"></canvas>' +
                    '<div class="chart-card-info">' +
                      '<div class="chart-card-title">' + (s.title || 'Untitled') + '</div>' +
                    '</div>' +
                  '</a>';
        }
        html += '</div>';
      }

      html += '<hr class="divider">';
      html += '<div class="create-section">' +
                '<span class="create-label" id="create-btn"><span id="create-text"></span><span id="create-cursor"></span></span>' +
              '</div>';

      content.innerHTML = html;

      // Draw mini charts after layout
      requestAnimationFrame(function() {
        for (var i = 0; i < stories.length; i++) {
          var c = document.getElementById('mini-' + stories[i].id);
          if (c) drawMiniChart(c, stories[i].plots || []);
        }
      });

      var createBtn = document.getElementById('create-btn');
      if (createBtn) {
        createBtn.onclick = function() {
          if (!user) { window.location.href = '/api/auth/login?redirect=' + encodeURIComponent(location.pathname); return; }
          var myStories = stories.filter(function(s) { return user && s.userid === user.email; });
          if (myStories.length >= MAX_STORIES) {
            alert('Maximum ' + MAX_STORIES + ' stories per user. Delete a story to make room.');
            return;
          }
          createBtn.style.pointerEvents = 'none';
          createBtn.style.opacity = '0.6';
          api('POST', 'stories', { title: 'My Story' }).then(function(result) {
            window.location.href = '/story.html?id=' + result.id;
          }).catch(function(e) {
            alert('Failed to create story: ' + e.message);
            createBtn.style.pointerEvents = '';
            createBtn.style.opacity = '';
          });
        };

        // One-time typewriter: "Story Charts" -> erase -> type "Create a Story Chart"
        var startWord = 'Story Charts';
        var endWord = 'Create a Story Chart';
        var textEl = document.getElementById('create-text');
        var cursorEl = document.getElementById('create-cursor');
        var randInt = function(min, max) { return min + Math.floor(Math.random() * (max - min)); };

        textEl.textContent = startWord;
        cursorEl.style.display = 'none';

        setTimeout(function() {
          cursorEl.style.display = '';
          // Erase startWord
          var eraseDelay = 0;
          for (var i = startWord.length; i >= 0; i--) {
            (function(idx, d) {
              setTimeout(function() { textEl.textContent = startWord.substring(0, idx); }, d);
            })(i, eraseDelay);
            eraseDelay += randInt(60, 140);
          }
          // Type endWord after erase finishes
          var typeStart = eraseDelay + 400;
          var lastType = typeStart;
          for (var i = 0; i < endWord.length; i++) {
            typeStart += randInt(80, 200);
            lastType = typeStart;
            (function(idx, d) {
              setTimeout(function() { textEl.textContent = endWord.substring(0, idx + 1); }, d);
            })(i, typeStart);
          }
          // Hide cursor after typing finishes
          setTimeout(function() { cursorEl.style.display = 'none'; }, lastType + 600);
        }, 15000);
      }
    })();
  </script>
</body>
</html>
