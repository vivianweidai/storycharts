<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Story Charts</title>
  <link rel="stylesheet" href="/app.css">
  <link rel="icon" href="/favicon/favicon.ico">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
</head>
<body>
  <div class="header" id="header"></div>
  <div id="content"><p class="empty">Loading...</p></div>

  <script src="/app.js"></script>
  <script>
    var COLORS = ['#4a7fd4','#e06040','#50a040','#d4a020','#9060c0'];
    var storyId, plots, chart;
    var selDi = -1, selPi = -1;       // persistent selection
    var dragDi = -1, dragPi = -1;     // active drag
    var isDragging = false, didMove = false;

    (async function() {
      var user = await getUser();
      renderHeader(user);
      var id = new URLSearchParams(location.search).get('id');
      if (!id) { location.href = '/'; return; }

      var data;
      try { data = await api('GET', 'stories/' + id); }
      catch (e) { document.getElementById('content').innerHTML = '<p class="empty">' + e.message + '</p>'; return; }

      storyId = data.story.id;
      plots = data.plots;
      var cp = data.chartPoints || [];

      document.getElementById('content').innerHTML =
        '<h1>' + (data.story.title || 'Untitled') + '</h1>' +
        '<div style="width:100%;aspect-ratio:1;border:1.5px solid #8ab;border-radius:6px;overflow:hidden;background:#eef4fb">' +
          '<canvas id="c" style="width:100%;height:100%;display:block;touch-action:none"></canvas>' +
        '</div>' +
        '<div id="label" style="text-align:center;font-size:0.85em;color:#888;margin-top:8px;min-height:1.4em"></div>';

      // Build datasets
      var byPlot = {};
      for (var i = 0; i < cp.length; i++) {
        if (!byPlot[cp[i].plot_id]) byPlot[cp[i].plot_id] = [];
        byPlot[cp[i].plot_id].push({ x: cp[i].x_pos / 100, y: cp[i].y_val / 100 });
      }
      var datasets = [];
      for (var pi = 0; pi < plots.length; pi++) {
        var pts = (byPlot[plots[pi].id] || []).sort(function(a,b){ return a.x - b.x; });
        datasets.push({
          label: plots[pi].title || 'Plot',
          data: pts,
          borderColor: COLORS[pi % COLORS.length],
          backgroundColor: COLORS[pi % COLORS.length],
          showLine: true, tension: 0,
          pointRadius: 5, pointHitRadius: 20,
          borderWidth: 2, fill: false
        });
      }

      var canvas = document.getElementById('c');
      chart = new Chart(canvas, {
        type: 'scatter',
        data: { datasets: datasets },
        options: {
          responsive: true, maintainAspectRatio: true, aspectRatio: 1,
          layout: { padding: 16 }, clip: false, animation: false,
          plugins: { legend: { display: false }, tooltip: { enabled: false } },
          scales: {
            x: { type:'linear', min:0, max:100, ticks:{display:false,stepSize:5},
                 grid:{color:'rgba(70,120,180,0.15)',lineWidth:0.5,drawTicks:false}, border:{display:false} },
            y: { type:'linear', min:0, max:100, ticks:{display:false,stepSize:5},
                 grid:{color:function(c){return c.tick.value===50?'rgba(70,120,180,0.4)':'rgba(70,120,180,0.15)'},
                       lineWidth:function(c){return c.tick.value===50?1.5:0.5},drawTicks:false}, border:{display:false} }
          }
        }
      });

      // --- Styling ---
      function applyStyle() {
        for (var d = 0; d < plots.length; d++) {
          var ds = chart.data.datasets[d];
          var len = ds.data.length;
          var color = COLORS[d % COLORS.length];
          var isSel = (selDi === d);
          var hasSel = (selDi >= 0);
          ds.borderColor = hasSel && !isSel ? color + '40' : color;
          ds.backgroundColor = hasSel && !isSel ? color + '40' : color;
          ds.borderWidth = isSel ? 10 : (hasSel ? 1 : 2);
          ds.pointRadius = new Array(len).fill(isSel ? 6 : (hasSel ? 3 : 5));
        }
        // Selected point: 2x
        if (selDi >= 0 && selPi >= 0 && selPi < chart.data.datasets[selDi].data.length) {
          chart.data.datasets[selDi].pointRadius[selPi] = 10;
        }
        chart.update('none');
        // Label
        var label = document.getElementById('label');
        if (selDi < 0) { label.textContent = ''; return; }
        var color = COLORS[selDi % COLORS.length];
        var name = plots[selDi].title || 'Plot';
        label.style.color = color;
        if (selPi >= 0 && chart.data.datasets[selDi].data[selPi]) {
          var pt = chart.data.datasets[selDi].data[selPi];
          label.textContent = name + '  (' + (pt.x*100).toFixed(0) + ', ' + (pt.y*100).toFixed(0) + ')';
        } else {
          label.textContent = name;
        }
      }

      // --- Hit detection ---
      function findHit(e) {
        var els = chart.getElementsAtEventForMode(e, 'nearest', { intersect: false }, false);
        for (var i = 0; i < els.length; i++) {
          if (els[i].datasetIndex < plots.length) return { di: els[i].datasetIndex, pi: els[i].index };
        }
        return null;
      }

      function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

      function posToVal(e) {
        var t = e.touches ? e.touches[0] : e;
        var r = canvas.getBoundingClientRect();
        var x = t.clientX - r.left, y = t.clientY - r.top;
        return {
          x: clamp(chart.scales.x.getValueForPixel(x), 0, 100),
          y: clamp(chart.scales.y.getValueForPixel(y), 0, 100)
        };
      }

      // --- Events ---
      function onStart(e) {
        var hit = findHit(e);
        if (!hit) return;
        e.preventDefault();
        isDragging = true; didMove = false;
        dragDi = hit.di; dragPi = hit.pi;
        selDi = hit.di; selPi = hit.pi;
        applyStyle();
      }

      function onMove(e) {
        if (!isDragging) return;
        e.preventDefault();
        didMove = true;
        var v = posToVal(e);
        chart.data.datasets[dragDi].data[dragPi].x = v.x;
        chart.data.datasets[dragDi].data[dragPi].y = v.y;
        applyStyle();
      }

      function onEnd() {
        if (!isDragging) return;
        isDragging = false;
        if (didMove) {
          chart.data.datasets[dragDi].data.sort(function(a,b){ return a.x - b.x; });
          selPi = -1; // keep plot selected, lose point after sort
          applyStyle();
          saveChart();
        }
        dragDi = -1; dragPi = -1;
      }

      canvas.addEventListener('click', function(e) {
        if (didMove) { didMove = false; return; }
        var hit = findHit(e);
        if (hit) return; // handled by onStart
        // Tap empty — deselect
        selDi = -1; selPi = -1;
        applyStyle();
      });

      canvas.addEventListener('mousedown', onStart);
      canvas.addEventListener('touchstart', onStart, { passive: false });
      window.addEventListener('mousemove', onMove);
      window.addEventListener('touchmove', onMove, { passive: false });
      window.addEventListener('mouseup', onEnd);
      window.addEventListener('touchend', onEnd);
    })();

    function saveChart() {
      var points = [];
      for (var di = 0; di < plots.length; di++) {
        var d = chart.data.datasets[di].data;
        for (var j = 0; j < d.length; j++) {
          points.push({ plot_id: plots[di].id, x_pos: Math.round(d[j].x*100), y_val: Math.round(d[j].y*100) });
        }
      }
      api('POST', 'stories/' + storyId + '/chartpoints', { points: points });
    }
  </script>
</body>
</html>
