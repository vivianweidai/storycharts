<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Story Charts</title>
  <link rel="stylesheet" href="/app.css">
  <link rel="icon" href="/favicon/favicon.ico">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
</head>
<body>
  <div class="header" id="header"></div>
  <div id="content"><p class="empty">Loading...</p></div>

  <script src="/app.js"></script>
  <script>
    (async function() {
      const user = await getUser();
      renderHeader(user);

      const id = new URLSearchParams(location.search).get('id');
      if (!id) { location.href = '/'; return; }

      let data;
      try { data = await api('GET', 'stories/' + id); }
      catch (e) { document.getElementById('content').innerHTML = '<p class="empty">' + e.message + '</p>'; return; }

      const { story, plots, chartPoints, isOwner } = data;
      const content = document.getElementById('content');
      let html = '';

      html += '<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">';
      html += '<h1 style="margin:0">' + (story.title || 'Untitled') + '</h1>';
      if (isOwner) html += '<button class="btn btn-sm" id="edit-story-btn">edit</button>';
      html += '</div>';

      // 5 style previews
      const names = ['1: Clean Minimal', '2: Blueprint', '3: Dotted', '4: Major/Minor', '5: Dark Mode'];
      for (let i = 0; i < 5; i++) {
        html += '<h2 style="margin:24px 0 6px;color:#656d76">Style ' + names[i] + '</h2>';
        html += '<div id="chart-' + i + '" style="height:280px;border-radius:8px"></div>';
      }

      if (isOwner) {
        html += '<div class="actions" style="justify-content:center;margin-top:20px">';
        html += '<button class="btn btn-add" id="add-plot-btn">+ Add Plot</button>';
        html += '</div>';
      }

      content.innerHTML = html;

      // Style configs
      const styles = [
        { // 1: Clean Minimal
          bg: '',
          xGrid: { color: '#e8e8e8', lineWidth: 0.5 }, xBorder: { display: true, color: '#e8e8e8', width: 1 },
          yGrid: { color: '#e8e8e8', lineWidth: 0.5 }, yBorder: { display: true, color: '#e8e8e8', width: 1 }
        },
        { // 2: Blueprint
          bg: '#f0f6ff',
          xGrid: { color: 'rgba(59,130,246,0.12)', lineWidth: 0.5 }, xBorder: { display: true, color: 'rgba(59,130,246,0.25)', width: 1.5 },
          yGrid: { color: 'rgba(59,130,246,0.12)', lineWidth: 0.5 }, yBorder: { display: true, color: 'rgba(59,130,246,0.25)', width: 1.5 }
        },
        { // 3: Dotted
          bg: '',
          xGrid: { color: '#d0d0d0', lineWidth: 0.5, borderDash: [2, 3] }, xBorder: { display: true, color: '#c0c0c0', width: 1, dash: [2, 3] },
          yGrid: { color: '#d0d0d0', lineWidth: 0.5, borderDash: [2, 3] }, yBorder: { display: true, color: '#c0c0c0', width: 1, dash: [2, 3] }
        },
        { // 4: Major/Minor
          bg: '',
          xGrid: { color: ctx => ctx.tick.value % 5 === 0 ? '#c8c8c8' : '#efefef', lineWidth: ctx => ctx.tick.value % 5 === 0 ? 1.5 : 0.5 },
          xBorder: { display: true, color: '#c8c8c8', width: 1.5 },
          yGrid: { color: ctx => ctx.tick.value % 5 === 0 ? '#c8c8c8' : '#efefef', lineWidth: ctx => ctx.tick.value % 5 === 0 ? 1.5 : 0.5 },
          yBorder: { display: true, color: '#c8c8c8', width: 1.5 }
        },
        { // 5: Dark Mode
          bg: '#1e1e2e',
          xGrid: { color: ctx => ctx.tick.value % 5 === 0 ? 'rgba(255,255,255,0.15)' : 'rgba(255,255,255,0.05)', lineWidth: ctx => ctx.tick.value % 5 === 0 ? 1 : 0.5 },
          xBorder: { display: true, color: 'rgba(255,255,255,0.2)', width: 1 },
          yGrid: { color: ctx => ctx.tick.value % 5 === 0 ? 'rgba(255,255,255,0.15)' : 'rgba(255,255,255,0.05)', lineWidth: ctx => ctx.tick.value % 5 === 0 ? 1 : 0.5 },
          yBorder: { display: true, color: 'rgba(255,255,255,0.2)', width: 1 }
        }
      ];

      // Render all 5
      const cp = chartPoints || [];
      for (let i = 0; i < 5; i++) {
        const el = document.getElementById('chart-' + i);
        if (styles[i].bg) el.style.background = styles[i].bg;
        if (plots.length) renderChart(el, plots, cp, styles[i]);
      }

      // Buttons
      const editBtn = document.getElementById('edit-story-btn');
      if (editBtn) editBtn.onclick = () => {
        showModal('Edit Story', [
          { name: 'title', label: 'Title', type: 'text', value: story.title }
        ], async (d) => { await api('PUT', 'stories/' + story.id, d); location.reload(); },
        async () => { await api('DELETE', 'stories/' + story.id); location.href = '/'; });
      };

      const addBtn = document.getElementById('add-plot-btn');
      if (addBtn) addBtn.onclick = () => {
        showModal('New Plot', [
          { name: 'title', label: 'Title', type: 'text' },
          { name: 'description', label: 'Description', type: 'textarea' }
        ], async (d) => { await api('POST', 'stories/' + story.id + '/plots', d); location.reload(); });
      };
    })();
  </script>
</body>
</html>
